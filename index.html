<script>
/* ============================================================
   경량 날짜 유틸 (dayjs 대체 - 외부 CDN 의존 제거)
   ============================================================ */
function dayjs(input){
  let d;
  if(input===undefined) d = new Date();
  else if(input instanceof Date) d = new Date(input);
  else if(typeof input === 'string'){
    d = new Date(input.length<=10 ? input+'T00:00:00' : input);
  } else d = new Date(input);

  const obj = {
    _d: d,
    format(fmt){
      const Y = d.getFullYear(), M = d.getMonth()+1, D = d.getDate();
      const dowNames = ['일','월','화','수','목','금','토'];
      const dow = dowNames[d.getDay()];
      const h = d.getHours(), m = d.getMinutes();
      const pad = n => String(n).padStart(2,'0');
      return fmt
        .replace(/YYYY/g, Y)
        .replace(/MM/g, pad(M))
        .replace(/M/g, M)
        .replace(/DD/g, pad(D))
        .replace(/D/g, D)
        .replace(/ddd/g, dow)
        .replace(/HH/g, pad(h))
        .replace(/mm/g, pad(m));
    },
    add(n, unit){
      const nd = new Date(d);
      if(unit==='day') nd.setDate(nd.getDate()+n);
      else if(unit==='month') nd.setMonth(nd.getMonth()+n);
      else if(unit==='year') nd.setFullYear(nd.getFullYear()+n);
      return dayjs(nd);
    },
    subtract(n, unit){ return obj.add(-n, unit); },
    diff(other, unit){
      const od = other._d ? other._d : new Date(other);
      const ms = d.getTime() - od.getTime();
      if(unit==='day') return Math.round(ms/86400000);
      if(unit==='month') return (d.getFullYear()-od.getFullYear())*12 + (d.getMonth()-od.getMonth());
      return ms;
    },
    date(n){
      if(n===undefined) return d.getDate();
      const nd = new Date(d); nd.setDate(n); return dayjs(nd);
    },
    day(){ return d.getDay(); },
    startOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setDate(1); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    endOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setMonth(nd.getMonth()+1); nd.setDate(0); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    isValid(){ return !isNaN(d.getTime()); }
  };
  return obj;
}

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZG9zcGRwaGxrY2p5dmRsdWtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDAyNTEsImV4cCI6MjA5ODM3NjI1MX0.o9IRhp5dsUark4xD3QnOieLdjA52JAcZMPXx-VmZNfU';

const SUPABASE_ROW_ID = 'main';

async function supabaseFetch(path, options={}){
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const {prefer, body, method, ...rest} = options;
  const res = await fetch(url, {
    method: method || 'GET',
    mode: 'cors',
    credentials: 'omit',
    body: body || undefined,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': prefer || 'return=representation',
    }
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text}`);
  }
  const text = await res.text();
  if(!text) return null;
  try{ return JSON.parse(text); }catch(e){ return null; }
}

async function loadStoreRemote(){
  const rows = await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}&select=data`);
  if(rows && rows.length>0 && rows[0].data && Object.keys(rows[0].data).length>0){
    const d = rows[0].data;
    // ── 마이그레이션: calendarEventTypes가 없거나 연차/반차가 빠진 경우 보완 ──
    const defaultEventTypes = [
      {name:'미팅', color:'#2554C7'},{name:'외근', color:'#D85A30'},
      {name:'마감', color:'#7C3AED'},{name:'연차', color:'#059669'},
      {name:'반차', color:'#0891B2'},{name:'반반차', color:'#65A30D'},
      {name:'개인 용무', color:'#F59E0B'},{name:'전화 통화', color:'#38BDF8'},
    ];
    if(!d.calendarEventTypes || d.calendarEventTypes.length < 3){
      d.calendarEventTypes = defaultEventTypes;
    } else {
      // 기존 유형에 없는 기본 유형만 앞에 추가
      const existingNames = d.calendarEventTypes.map(t=>t.name);
      const missing = defaultEventTypes.filter(t=>!existingNames.includes(t.name));
      if(missing.length > 0){
        d.calendarEventTypes = [...missing, ...d.calendarEventTypes];
      }
    }
    return d;
  }
  // 행이 비어있으면 시드 데이터로 초기 저장
  const seed = seedData();
  await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ data: seed })
  });
  return seed;
}

let saveTimer = null;
let saveInFlight = false;
let savePending = false;

function saveStore(){
  // 디바운스: 짧은 시간 내 연속 저장 요청을 묶어서 한 번만 전송
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSaveStore, 400);
}

async function doSaveStore(){
  if(saveInFlight){ savePending = true; return; }
  saveInFlight = true;
  try{
    await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ data: state.data, updated_at: new Date().toISOString() })
    });
    setSyncStatus('synced');
  }catch(e){
    console.error('저장 실패:', e);
    setSyncStatus('error');
  }finally{
    saveInFlight = false;
    if(savePending){ savePending = false; doSaveStore(); }
  }
}

function setSyncStatus(status){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(status==='saving'){ el.textContent = '저장 중...'; el.style.color = 'var(--muted)'; }
  else if(status==='synced'){ el.textContent = '저장됨'; el.style.color = '#3B6D11'; }
  else if(status==='error'){ el.textContent = '저장 실패'; el.style.color = '#A32D2D'; }
}

function getPublicHolidays(year){
  const holidays = [];
  // ── 한국 법정 공휴일 ──
  const kr = [
    {date:`${year}-01-01`, name:'신정'},
    {date:`${year}-03-01`, name:'삼일절'},
    {date:`${year}-05-05`, name:'어린이날'},
    {date:`${year}-06-06`, name:'현충일'},
    {date:`${year}-08-15`, name:'광복절'},
    {date:`${year}-10-03`, name:'개천절'},
    {date:`${year}-10-09`, name:'한글날'},
    {date:`${year}-12-25`, name:'크리스마스'},
  ];
  // 설날 (음력 1/1 전후) — 2025~2027 하드코딩
  const seollal = {'2025':['2025-01-28','2025-01-29','2025-01-30'],'2026':['2026-02-16','2026-02-17','2026-02-18'],'2027':['2027-02-06','2027-02-07','2027-02-08']};
  const chuseok = {'2025':['2025-10-05','2025-10-06','2025-10-07'],'2026':['2026-09-24','2026-09-25','2026-09-26'],'2027':['2027-10-13','2027-10-14','2027-10-15']};
  const buddha = {'2025':'2025-05-12','2026':'2026-05-02','2027':'2027-05-22'};
  const memorial = {'2025':'2025-04-22','2026':'2026-04-14','2027':'2027-04-06'};
  const ys = String(year);
  if(seollal[ys]) seollal[ys].forEach((d,i)=>holidays.push({date:d,name:['설날 전날','설날','설날 다음날'][i],country:'KR'}));
  if(chuseok[ys]) chuseok[ys].forEach((d,i)=>holidays.push({date:d,name:['추석 전날','추석','추석 다음날'][i],country:'KR'}));
  if(buddha[ys]) holidays.push({date:buddha[ys],name:'부처님 오신 날',country:'KR'});
  kr.forEach(h=>holidays.push({...h,country:'KR'}));

  // ── 미국 법정 공휴일 ──
  const us = [
    {date:`${year}-01-01`, name:'New Year\'s Day'},
    {date:`${year}-07-04`, name:'Independence Day'},
    {date:`${year}-11-11`, name:'Veterans Day'},
    {date:`${year}-12-25`, name:'Christmas Day'},
  ];
  // 변동 공휴일 (요일 기반) — 간단 계산
  function nthWeekday(y,m,weekday,n){ // n번째 weekday(0=일,1=월...)
    let d=1; while(new Date(y,m-1,d).getDay()!==weekday) d++;
    return new Date(y,m-1,d+(n-1)*7);
  }
  function lastWeekday(y,m,weekday){
    let d=new Date(y,m,0); // 마지막 날
    while(d.getDay()!==weekday) d.setDate(d.getDate()-1);
    return d;
  }
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  us.push({date:fmt(nthWeekday(year,1,1,3)),name:'MLK Day'});       // 1월 셋째 월
  us.push({date:fmt(nthWeekday(year,2,1,3)),name:'Presidents Day'}); // 2월 셋째 월
  us.push({date:fmt(lastWeekday(year,5,1)),name:'Memorial Day'});    // 5월 마지막 월
  us.push({date:fmt(nthWeekday(year,9,1,1)),name:'Labor Day'});      // 9월 첫째 월
  us.push({date:fmt(nthWeekday(year,10,1,2)),name:'Columbus Day'});  // 10월 둘째 월
  us.push({date:fmt(nthWeekday(year,11,4,4)),name:'Thanksgiving'});  // 11월 넷째 목
  us.forEach(h=>holidays.push({...h,country:'US'}));

  return holidays;
}

function allCalendarEvents(){
  const evs = state.data.calendar.map(e=>({...e}));
  // 프로젝트 마감일
  state.data.projects.forEach(p=>{
    if(p.deadline){
      evs.push({id:'deadline_'+p.id, date:p.deadline, type:'마감', title:p.title+' 마감', time:'', projectId:p.id});
    }
    // 체크리스트 항목 마감일
    (p.checklist||[]).forEach(c=>{
      if(c.dueDate && !c.done){
        evs.push({id:'ck_'+c.id, date:c.dueDate, type:'마감', title:`[${p.title}] ${c.text}`, time:'', projectId:p.id});
      }
    });
  });
  // 연차/반차 자동 반영
  (state.data.leave?.logs||[]).forEach(l=>{
    if(!evs.find(e=>e.id==='leave_'+l.id)){
      evs.push({id:'leave_'+l.id, date:l.date, type:l.type, title:l.type+(l.memo?' ('+l.memo+')':''), time:''});
    }
  });
  // 공휴일 (현재 연도 + 내년)
  const yr = new Date().getFullYear();
  [yr, yr+1].forEach(y=>{
    getPublicHolidays(y).forEach(h=>{
      evs.push({id:'holiday_'+h.date+'_'+h.country, date:h.date, type:h.country==='KR'?'한국 공휴일':'미국 공휴일', title:h.name+(h.country==='KR'?' 🇰🇷':' 🇺🇸'), time:'', isHoliday:true, country:h.country});
    });
  });
  return evs;
}

function avatarColor(name){
  const colors = ['#2554C7','#7C3AED','#DB2777','#D97706','#059669','#DC2626','#0891B2','#65A30D'];
  let h = 0; for(let c of (name||'?')) h = (h*31 + c.charCodeAt(0)) & 0xFFFFFF;
  return colors[Math.abs(h) % colors.length];
}
function av(name, size=28, logoUrl){
  // logoUrl 우선 → vendor 데이터에서 자동 탐색 → 이니셜 폴백
  const url = logoUrl || (() => {
    const v = state.data?.vendors?.find(x=>x.name===name);
    return v?.logoUrl || null;
  })();
  if(url){
    return `<img src="${url}" alt="${name}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;background:#fff;border:0.5px solid var(--bd);flex-shrink:0"/>`;
  }
  const initials = (name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const bg = avatarColor(name);
  return `<div class="av" style="width:${size}px;height:${size}px;background:${bg};font-size:${size<=24?9:11}px;flex-shrink:0;border-radius:50%">${initials}</div>`;
}

let clockInterval = null;
function startClock(){
  function tick(){
    const krEl = document.getElementById('clockKR');
    const usEl = document.getElementById('clockUS');
    const krDateEl = document.getElementById('dateKR');
    const usDateEl = document.getElementById('dateUS');
    if(!krEl) return;
    const now = new Date();
    const kr = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const us = new Date(now.toLocaleString('en-US',{timeZone:'America/Los_Angeles'}));
    const fmt = d=>`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    const fmtD = d=>{
      const days=['일','월','화','수','목','금','토'];
      return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`;
    };
    krEl.textContent = fmt(kr);
    usEl.textContent = fmt(us);
    if(krDateEl) krDateEl.textContent = fmtD(kr);
    if(usDateEl) usDateEl.textContent = fmtD(us);
  }
  if(clockInterval) clearInterval(clockInterval);
  tick();
  clockInterval = setInterval(tick, 1000);
}


async function loadQuote(){
  // 다국어 명언 API (zenquotes.io 또는 fallback)
  const fallbacks = [
    '성공은 작은 노력들이 매일 반복된 결과입니다.',
    '오늘 할 수 있는 일을 내일로 미루지 마세요.',
    '목표를 향해 한 걸음씩 나아가는 것이 중요합니다.',
    '어려운 상황이 훌륭한 사람을 만듭니다.',
    '작은 진전이라도 진전입니다.',
    '지금 이 순간에 집중하세요.',
    '성장은 편안함 밖에서 일어납니다.',
    '끈기는 재능을 이깁니다.',
    '실패는 성공의 어머니입니다.',
    '오늘도 최선을 다하면 됩니다.'
  ];
  try{
    const res = await fetch('https://api.quotable.io/random?maxLength=100', {mode:'cors'});
    if(res.ok){
      const data = await res.json();
      const el = document.getElementById('quoteText');
      if(el) el.textContent = `"${data.content}" — ${data.author}`;
      return;
    }
  }catch(e){}
  // 폴백: 로컬 명언
  const el = document.getElementById('quoteText');
  if(el) el.textContent = fallbacks[new Date().getDate() % fallbacks.length];
}

}

  let vendors = state.data.vendors.map(v=>({...v, latest:latestLogForVendor(v.id)}));

  if(state.vendorSearch){
    const q = state.vendorSearch.toLowerCase();
    vendors = vendors.filter(v=>v.name.toLowerCase().includes(q)||(v.contact.name||'').toLowerCase().includes(q));
  }
  if(activeType !== '전체') vendors = vendors.filter(v=>(v.companyType||'벤더') === activeType);
  if(statusFilter !== '전체') vendors = vendors.filter(v=>(v.companyStatus||'Active') === statusFilter);
  if(priorityFilter !== '전체') vendors = vendors.filter(v=>v.priority === priorityFilter);

  // 거래중 상단 정렬
  const statusOrder = {'Active':0,'Pending':1,'Inactive':2};
  vendors.sort((a,b)=>{
    const so = (statusOrder[a.companyStatus]??1) - (statusOrder[b.companyStatus]??1);
    if(so!==0) return so;
    // 이름 가나다/ABC 순
    return a.name.localeCompare(b.name, ['ko','en'], {sensitivity:'base'});
  });

  const highCount = vendors.filter(v=>v.priority==='높음').length;
  const waitingCount = vendors.filter(v=>{const l=latestLogForVendor(v.id);return l&&(l.status==='전송'||l.status==='수신');}).length;
  const staleCount = vendors.filter(v=>v.latest&&daysAgo(v.latest.date)>=90).length;

  const typeBadge = t=>({
    '벤더':  {bg:'#EBF0FB',color:'#1A3A9E'},
    '물류사':{bg:'#EAF3DE',color:'#3B6D11'},
    '파트너':{bg:'#FEF3C7',color:'#92400E'},
    '기타':  {bg:'#F1EFE8',color:'#5F5E5A'},
  }[t]||{bg:'#F1EFE8',color:'#5F5E5A'});

  return `
    <div class="sh">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:16px;font-weight:600">Company</span>
        <div class="search-wrap" style="width:220px"><i class="ti ti-search"></i><input class="inp" id="vendorSearchInput" placeholder="회사명 또는 담당자 검색" value="${state.vendorSearch}" style="margin:0"/></div>
      </div>
      ${!isReadOnly()?`<div style="display:flex;gap:8px"><button class="btn" id="manageCompanyTypesBtn"><i class="ti ti-settings"></i> 유형 관리</button><button class="btn btn-o" id="addVendorBtn"><i class="ti ti-plus"></i> 회사 추가</button></div>`:''}
    </div>

    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
      ${companyTypes.map(t=>`<button class="btn ${activeType===t?'btn-o':''}" data-vendor-type="${t}">${t}${t!=='전체'?` (${state.data.vendors.filter(v=>(v.companyType||'벤더')===t).length})`:` (${state.data.vendors.length})`}</button>`).join('')}
      <div style="margin-left:auto;display:flex;gap:6px">
        <select class="inp" id="vendorStatusFilter" style="font-size:11px;padding:3px 8px;margin:0;width:auto">
          <option value="전체" ${statusFilter==='전체'?'selected':''}>거래상태 전체</option>
          <option value="Active" ${statusFilter==='Active'?'selected':''}>거래중</option>
          <option value="Pending" ${statusFilter==='Pending'?'selected':''}>대기중</option>
          <option value="Inactive" ${statusFilter==='Inactive'?'selected':''}>거래중단</option>
        </select>
        <select class="inp" id="vendorPriorityFilter" style="font-size:11px;padding:3px 8px;margin:0;width:auto">
          <option value="전체" ${priorityFilter==='전체'?'selected':''}>우선순위 전체</option>
          <option value="높음" ${priorityFilter==='높음'?'selected':''}>높음</option>
          <option value="보통" ${priorityFilter==='보통'?'selected':''}>보통</option>
          <option value="낮음" ${priorityFilter==='낮음'?'selected':''}>낮음</option>
        </select>
      </div>
    </div>

    <div class="krow" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi"><div class="kn">${vendors.length}</div><div class="kl">표시 중</div></div>
      <div class="kpi"><div class="kn" style="color:#A32D2D">${highCount}</div><div class="kl">우선순위 높음</div></div>
      <div class="kpi"><div class="kn">${waitingCount}</div><div class="kl">회신 대기</div></div>
      <div class="kpi"><div class="kn" style="color:#B45309">${staleCount}</div><div class="kl">90일 이상 정체</div></div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <colgroup><col style="width:16%"><col style="width:8%"><col style="width:7%"><col style="width:22%"><col style="width:13%"><col style="width:9%"><col style="width:9%"><col style="width:12%"><col style="width:4%"></colgroup>
        <thead><tr>
          <th>회사명</th><th>거래 상태</th><th>유형</th><th>경과일</th><th>최근 상황</th><th>액션 상태</th><th>우선순위</th><th>담당자</th><th></th>
        </tr></thead>
        <tbody>
        ${vendors.length===0?`<tr><td colspan="9"><div class="empty-state">검색 결과가 없습니다.</div></td></tr>`:
          vendors.map(v=>{
            const days=v.latest?daysAgo(v.latest.date):null;
            const asBadge = v.actionStatus ? vendorActionBadge(v.actionStatus) : '';
            const ct = v.companyType||'벤더';
            const tb = typeBadge(ct);
            return `<tr class="clickable vendor-row" data-vid="${v.id}">
              <td><div style="display:flex;align-items:center;gap:8px">${av(v.name,24)}<span style="font-weight:500">${v.name}</span></div></td>
              <td><select class="vendor-status-select" data-vid="${v.id}" onclick="event.stopPropagation()" style="font-size:11px;padding:2px 6px;border-radius:20px;border:1px solid;cursor:pointer;outline:none;${vendorStatusStyle(v.companyStatus||'Active')}">${['Active','Pending','Inactive'].map(s=>`<option value="${s}" ${(v.companyStatus||'Active')===s?'selected':''}>${s}</option>`).join('')}</select></td>
              <td><span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${tb.bg};color:${tb.color};font-weight:500">${ct}</span></td>
              <td style="${days>=90?'color:#A32D2D;font-weight:500':''}">${days!==null?days+'일':'-'}</td>
              <td style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:1px">${v.latest?v.latest.summary:'-'}</td>
              <td>${asBadge}</td>
              <td><span class="badge ${priorityBadge(v.priority)}">${v.priority}</span></td>
              <td style="color:var(--muted)">${v.contact.name||'-'}</td>
              <td><i class="ti ti-chevron-right" style="color:var(--muted);font-size:14px"></i></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function viewVendorDetail(){

  const projects = projectsForVendor(v.id);
  const latest = logs[0];

  const actionStatuses = [

    {value:'발주 예정', label:'🛒 발주 예정', bg:'#EBF0FB', color:'#1A3A9E'},
    {value:'계약 진행중', label:'📝 계약 진행중', bg:'#FEF3C7', color:'#92400E'},
    {value:'팔로업 필요', label:'🔔 팔로업 필요', bg:'#FCEBEB', color:'#A32D2D'},
    {value:'협의 완료', label:'✅ 협의 완료', bg:'#EAF3DE', color:'#3B6D11'},
    {value:'보류', label:'⏸ 보류', bg:'var(--sf)', color:'var(--muted)'},

  return `

      <div style="display:flex;align-items:center;gap:12px">
        <div style="position:relative;flex-shrink:0">
          ${av(v.name, 48)}
          ${!isReadOnly()?`
          <label id="logoUploadLabel" title="로고 변경" style="position:absolute;bottom:-4px;right:-4px;width:20px;height:20px;background:var(--o);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid white">
            <i class="ti ti-camera" style="font-size:10px;color:#fff"></i>
            <input type="file" id="logoFileInput" accept="image/*" style="display:none"/>
          </label>`:''}
        </div>
        <div>
          <div style="font-size:18px;font-weight:600">${v.name}</div>
          <div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap">
            <span class="badge ${priorityBadge(v.priority)}">${v.priority}</span>
            ${v.companyType?`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#EBF0FB;color:#1A3A9E">${v.companyType}</span>`:''}
            ${days!==null?`<span class="badge bgr">${days}일 경과</span>`:''}
            <select class="vendor-status-select" data-vid="${v.id}" style="font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;cursor:pointer;outline:none;${vendorStatusStyle(v.companyStatus||'Active')}">${['Active','Pending','Inactive'].map(s=>`<option value="${s}" ${(v.companyStatus||'Active')===s?'selected':''}>${s}</option>`).join('')}</select>
            ${v.logoUrl?`<button id="removeLogoBtn" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0"><i class="ti ti-photo-off"></i> 로고 삭제</button>`:''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        ${!isReadOnly()?`<button class="btn btn-red" id="deleteVendorBtn"><i class="ti ti-trash"></i> 삭제</button>`:''}
        ${!isReadOnly()?`<button class="btn" id="editVendorBtn"><i class="ti ti-pencil"></i> 편집</button>`:''}
      </div>
    </div>

    ${latest ? `
    <div style="background:${currentStatus.bg};border:0.5px solid ${currentStatus.color}22;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${fmtDateDow(latest.date)} · ${latest.type} · 최신 업데이트</div>
        <div style="font-size:13px;font-weight:500;line-height:1.5">${latest.summary}</div>
        ${latest.nextStep?`<div style="font-size:12px;color:var(--muted);margin-top:4px">→ ${latest.nextStep}</div>`:''}
      </div>
      ${!isReadOnly()?`
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <div style="font-size:11px;color:var(--muted);font-weight:500">현재 액션 상태</div>
        <select id="actionStatusSelect" style="font-size:12px;padding:5px 10px;border-radius:20px;border:1.5px solid ${currentStatus.color};background:${currentStatus.bg};color:${currentStatus.color};cursor:pointer;font-weight:500;outline:none">
          ${actionStatuses.map(s=>`<option value="${s.value}" ${v.actionStatus===s.value?'selected':''}>${s.label}</option>`).join('')}
        </select>
      </div>`:
      v.actionStatus?`<span style="font-size:12px;padding:4px 12px;border-radius:20px;background:${currentStatus.bg};color:${currentStatus.color};font-weight:500;border:1px solid ${currentStatus.color}22">${currentStatus.label}</span>`:''}
    </div>` : `
    <div style="background:var(--sf);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--muted);text-align:center">
      아직 활동 로그가 없습니다. 로그를 추가해주세요.
    </div>`}


    <!-- ── 사이드바 + 메인 2단 레이아웃 ── -->
    <div style="display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start">

      <!-- 왼쪽 사이드바 -->
      <div style="display:flex;flex-direction:column;gap:12px">

        <!-- 담당자 -->
        <div class="card" style="padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">담당자</span>
            ${!isReadOnly()?`<button class="btn btn-o" id="addPersonBtn" style="font-size:10px;padding:3px 8px"><i class="ti ti-plus"></i> 추가</button>`:''}
          </div>
          ${(() => {
            const people = v.people || [];
            if(people.length === 0) return `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">담당자 없음</div>`;
            return people.map((p,i) => `
              <div class="person-row" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--bd)">
                ${av(p.name, 28)}
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:4px">
                    <span style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||'-'}</span>
                    ${p.isMain?`<span style="font-size:9px;background:var(--ol);color:var(--od);padding:1px 5px;border-radius:20px;flex-shrink:0">메인</span>`:''}
                  </div>
                  ${p.title?`<div style="font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.title}</div>`:''}
                  ${p.email?`<a href="mailto:${p.email}" style="font-size:10px;color:var(--o);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.email}</a>`:''}
                  ${p.phone?`<div style="font-size:10px;color:var(--muted)">${p.phone}</div>`:''}
                </div>
                ${!isReadOnly()?`<div style="display:flex;gap:2px;flex-shrink:0">
                  <button class="btn person-edit-btn" data-idx="${i}" style="padding:2px 5px;font-size:10px"><i class="ti ti-pencil"></i></button>
                  ${!p.isMain?`<button class="btn person-set-main-btn" data-idx="${i}" style="padding:2px 5px;font-size:10px">⭐</button>`:''}
                  <button class="btn btn-red person-del-btn" data-idx="${i}" style="padding:2px 5px;font-size:10px"><i class="ti ti-trash"></i></button>
                </div>`:''}
              </div>`).join('');
          })()}
        </div>

        <!-- 거래 메모 -->
        <div class="card" style="padding:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">거래 메모</span>
            ${!isReadOnly()?`<button class="btn" id="addNoteFieldBtn" style="font-size:10px;padding:3px 8px"><i class="ti ti-plus"></i> 추가</button>`:''}
          </div>
          <div id="customNotesList">
            ${(v.customNotes||[
              {key:'할인율',val:v.notes.discount||''},
              {key:'결제 조건',val:v.notes.payment||''},
              {key:'MOQ',val:v.notes.moq||''},
              {key:'Credit Limit',val:v.notes.creditLimit||''}
            ]).map((n,i)=>`
              <div class="custom-note-row" style="padding:6px 0;border-bottom:0.5px solid var(--bd)">
                ${!isReadOnly()
                  ?`<div style="font-size:10px;color:var(--muted);margin-bottom:2px"><input type="text" class="inp note-key" data-idx="${i}" value="${(n.key||'').replace(/"/g,'&quot;')}" style="width:100%;margin:0;font-size:10px;padding:2px 6px;font-weight:500;color:var(--muted)"/></div>
                    <input type="text" class="inp note-val" data-idx="${i}" value="${(n.val||'').replace(/"/g,'&quot;')}" style="width:100%;margin:0;font-size:12px;padding:3px 6px"/>`
                  :`<div style="font-size:10px;color:var(--muted)">${n.key}</div>
                    <div style="font-size:12px;font-weight:500;margin-top:1px">${n.val||'-'}</div>`}
                ${!isReadOnly()?`<button class="btn btn-red note-del-btn" data-idx="${i}" style="padding:1px 5px;font-size:10px;margin-top:4px"><i class="ti ti-x"></i></button>`:''}
              </div>`).join('')}
          </div>
          ${!isReadOnly()?`<button class="btn btn-o" id="saveNoteFieldsBtn" style="width:100%;margin-top:8px;font-size:11px"><i class="ti ti-device-floppy"></i> 메모 저장</button>`:''}
        </div>

      </div>

      <!-- 오른쪽 메인 -->
      <div style="display:flex;flex-direction:column;gap:12px">

        ${projects.length>0?`<div class="card" style="padding:12px 16px">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">연결된 프로젝트</div>
          ${projects.map(p=>`<div class="dash-row proj-link" data-pid="${p.id}" style="cursor:pointer;padding:6px 0">
            <i class="ti ti-checklist" style="font-size:12px;color:var(--o)"></i>
            <span style="flex:1;font-size:13px;font-weight:500">${p.title}</span>
            <div class="pgb" style="width:60px;flex-shrink:0"><div class="pgf" style="width:${progressOf(p)}%;background:var(--o)"></div></div>
            <span style="font-size:11px;color:var(--muted);width:28px;text-align:right">${progressOf(p)}%</span>
          </div>`).join('')}
        </div>`:''}

        <!-- 파일/링크 섹션 -->
        ${(() => {
          const allLinks = logs.flatMap(l=>(l.links||[]).map(lk=>({...lk, logDate:l.date, logSummary:l.summary})));
          return `<div class="card" style="padding:14px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em"><i class="ti ti-paperclip" style="font-size:12px"></i> 파일 & 링크</span>
              <span style="font-size:10px;color:var(--muted)">${allLinks.length}건</span>
            </div>
            ${allLinks.length===0
              ? `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px 0">로그에 첨부된 파일/링크가 없습니다.</div>`
              : allLinks.map(lk=>`
                <a href="${lk.url}" target="_blank" style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd);text-decoration:none;color:inherit">
                  <i class="ti ti-${lk.url.includes('drive.google')?'brand-google-drive':lk.url.includes('notion')?'brand-notion':'link'}" style="font-size:14px;color:var(--o);flex-shrink:0"></i>
                  <div style="flex:1;min-width:0">
                    <div style="font-size:12px;font-weight:500;color:var(--o);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lk.label||lk.url}</div>
                    <div style="font-size:10px;color:var(--muted);margin-top:1px">${fmtDate(lk.logDate)} · ${lk.logSummary.slice(0,30)}${lk.logSummary.length>30?'…':''}</div>
                  </div>
                  <i class="ti ti-external-link" style="font-size:11px;color:var(--muted);flex-shrink:0"></i>
                </a>`).join('')}
          </div>`;
        })()}

        <div class="card" style="padding:0;overflow:hidden">
          ${(() => {
            const years = [...new Set(logs.map(l=>dayjs(l.date).format('YYYY')))].sort((a,b)=>b-a);
            const fy = state.vendorLogFilterYear;
            const fm = state.vendorLogFilterMonth;
            let filtered = logs;
            if(fy!=='all') filtered = filtered.filter(l=>dayjs(l.date).format('YYYY')===fy);
            if(fm!=='all') filtered = filtered.filter(l=>dayjs(l.date).format('M')===fm);
            const displayLogs = state.vendorLogExpanded ? filtered : filtered.slice(0,5);
            const groups = {};
            displayLogs.forEach(l=>{
              const ym = dayjs(l.date).format('YYYY년 M월');
              if(!groups[ym]) groups[ym] = [];
              groups[ym].push(l);
            });
            return `
            <div class="sh" style="padding:12px 16px;border-bottom:0.5px solid var(--bd)">
              <div class="st"><i class="ti ti-history oi"></i>활동 로그 <span style="font-size:11px;color:var(--muted);font-weight:400">(${filtered.length}/${logs.length}건)</span></div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <select id="logYearFilter" class="inp" style="font-size:11px;padding:3px 8px;margin:0;width:auto" onchange="state.vendorLogFilterYear=this.value;state.vendorLogExpanded=false;render()">
                  <option value="all" ${fy==='all'?'selected':''}>전체 연도</option>
                  ${years.map(y=>`<option value="${y}" ${fy===y?'selected':''}>${y}년</option>`).join('')}
                </select>
                <select id="logMonthFilter" class="inp" style="font-size:11px;padding:3px 8px;margin:0;width:auto" onchange="state.vendorLogFilterMonth=this.value;state.vendorLogExpanded=false;render()">

function checklistAssigneeName(c){
  if(!c.assigneeId) return '';
  if(c.assigneeType==='internal') return c.assigneeId;
  const people=allPeopleFlat();
  const person=people.find(p=>p.id===c.assigneeId);
  return person?`${person.companyName} · ${person.name}`:'';
}

function checklistStatusColor(status){
  if(status==='완료') return {bg:'#EAF3DE',text:'#3B6D11'};
  if(status==='진행중') return {bg:'var(--ol)',text:'var(--od)'};
  if(status==='보류') return {bg:'#FEF3C7',text:'#92400E'};
  return {bg:'var(--sf)',text:'var(--muted)'};
}

function viewCalendar(){
  const month = dayjs(state.calMonth+'-01');
  const startDay = month.startOf('month').day();
  const daysInMonth = month.endOf('month').date();
  const todayStr = dayjs().format('YYYY-MM-DD');
  const allEvs = allCalendarEvents();
  const dowNames = ['일','월','화','수','목','금','토'];
  let cells = [];
  for(let i=0;i<startDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  // 이번 달 일정 목록 (오늘 이후)
  const monthStr = month.format('YYYY-MM');
  const monthEvs = allEvs.filter(e=>e.date.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date));
  const todayEvs = allEvs.filter(e=>e.date===todayStr);

  // 모든 이벤트 타입 (calendarEventTypes에서)
  const allEventTypes = state.data.calendarEventTypes || [
    {name:'미팅',color:'#2554C7'},{name:'외근',color:'#D85A30'},{name:'마감',color:'#7C3AED'},
    {name:'연차',color:'#059669'},{name:'반차',color:'#0891B2'},{name:'반반차',color:'#65A30D'},
    {name:'개인 용무',color:'#F59E0B'},{name:'전화 통화',color:'#38BDF8'}
  ];

  return `
    <div class="sh">

function bindLogModal(preVendorId, preProjectId){
  bindModalCommon();

  // 거래처 변경 → 프로젝트 드롭다운 동적 업데이트
  const vendorSel = document.getElementById('lmVendorSel');
  const projSel = document.getElementById('lmProjSel');
  function updateProjects(vid){
    if(!projSel) return;
    const rel = state.data.projects.filter(p=>{
      const ids = p.vendorIds||(p.vendorId?[p.vendorId]:[]);
      return vid && ids.includes(vid);
    });
    projSel.innerHTML = `<option value="">없음</option>`
      + rel.map(p=>`<option value="${p.id}" ${p.id===preProjectId?'selected':''}>${p.title}</option>`).join('');
  }
  if(vendorSel) vendorSel.addEventListener('change', ()=>updateProjects(vendorSel.value));

  // AI 요약
  const aiBtn = document.getElementById('lmAiBtn');
  if(aiBtn) aiBtn.addEventListener('click', ()=>{
    const raw = document.getElementById('lmRawText')?.value?.trim();
    if(!raw){ showToast('원본 내용을 먼저 입력해주세요.'); return; }
    const summary = generateOneLineSummary(raw);
    const summEl = document.getElementById('lmSummary');
    if(summEl) summEl.value = summary;
    showToast('AI 요약이 생성되었습니다.');
  });

  // 파일 링크 추가
  const addLinkBtn = document.getElementById('lmAddLinkBtn');
  if(addLinkBtn) addLinkBtn.addEventListener('click', ()=>{
    const label = document.getElementById('lmLinkLabel').value.trim();
    const url = document.getElementById('lmLinkUrl').value.trim();
    if(!url){ showToast('URL을 입력해주세요.'); return; }
    const list = document.getElementById('lmLinkList');
    const id = uid('lk');
    const row = document.createElement('div');
    row.className = 'link-row';
    row.dataset.id = id;
    row.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--sf);border-radius:6px';
    row.innerHTML = `<i class="ti ti-paperclip" style="font-size:12px;color:var(--muted)"></i>
      <input type="hidden" class="link-label" value="${label||url}"/>
      <input type="hidden" class="link-url" value="${url}"/>
      <span style="font-size:12px;flex:1">${label||url}</span>
      <button type="button" class="btn btn-red" style="padding:2px 6px;font-size:10px" onclick="this.closest('.link-row').remove()"><i class="ti ti-x"></i></button>`;
    list.appendChild(row);
    document.getElementById('lmLinkLabel').value = '';
    document.getElementById('lmLinkUrl').value = '';
  });

  // 폼 제출
  const form = document.getElementById('logModalForm');
  if(form) form.addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(form);
    const vendorId = fd.get('vendorId');
    const linkedProjectId = fd.get('linkedProjectId')||'';
    const nextStep = fd.get('nextStep')||'';
    const needsApproval = fd.get('needsApproval')==='on';

    // 링크 수집
    const links = [];
    document.querySelectorAll('#lmLinkList .link-row').forEach(row=>{
      const url = row.querySelector('.link-url')?.value?.trim();
      const label = row.querySelector('.link-label')?.value?.trim();
      if(url) links.push({url, label:label||url});
    });

    const newLog = {
      id: uid('vl'), vendorId, date: fd.get('date'),
      type: fd.get('type'), status: fd.get('status'), priority: fd.get('priority'),
      summary: fd.get('summary'), nextStep,
      nextStepDue: fd.get('nextStepDue')||'',
      rawText: fd.get('rawText')||'',
      needsApproval, nextStepDone: false,
      links, linkedProjectId
    };

    state.data.vendorLogs.push(newLog);
    state.data.vendorLogs.sort((a,b)=>b.date.localeCompare(a.date));

    // 다음액션 → 벤더 체크리스트 자동 생성
    if(nextStep && vendorId){
      const vendor = state.data.vendors.find(v=>v.id===vendorId);
      if(vendor){
        if(!vendor.checklist) vendor.checklist = [];
        vendor.checklist.push({id:uid('ck'), text:nextStep, done:false, fromLog:newLog.id});
      }
    }

    // 대표님 승인
    if(needsApproval){
      if(!state.data.approvalItems) state.data.approvalItems = [];
      state.data.approvalItems.push({id:uid('ap'), vendorId, content: fd.get('summary'), date: fd.get('date'), approved:false});
    }

    // 연결 프로젝트에 자동 반영
    if(linkedProjectId){
      const proj = state.data.projects.find(p=>p.id===linkedProjectId);
      if(proj){
        if(!proj.vendorLogs) proj.vendorLogs = {};
        if(!proj.vendorLogs[vendorId]) proj.vendorLogs[vendorId] = [];
        proj.vendorLogs[vendorId].unshift(newLog);
      }
    }

    closeModal();
    persist();
    render();
    showToast('로그가 저장되었습니다.');
  });
}


/* ---------- 연차 계산 로직 ---------- */
function calcLeave(){
  const l = state.data.leave;
  let totalGranted = 0;
  let grantDetails = [];
  let yearsWorked = 0;
  let monthsWorked = 0;

  if(l.joinDate){
    const join = new Date(l.joinDate + 'T00:00:00');
    const now = new Date();

    // 정확한 연/월 계산
    yearsWorked = now.getFullYear() - join.getFullYear();
    const monthDiff = now.getMonth() - join.getMonth();
    const dayDiff = now.getDate() - join.getDate();

    // 아직 기념일이 지나지 않았으면 1년 빼기
    if(monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) yearsWorked--;

    // 총 완성된 개월수
    monthsWorked = (now.getFullYear() - join.getFullYear()) * 12 + (now.getMonth() - join.getMonth());
    if(dayDiff < 0) monthsWorked--;
    monthsWorked = Math.max(0, monthsWorked);

    if(yearsWorked < 1){
      // 1년 미만: 완성된 개월수만큼 발생 (최대 11개)
      const months = Math.min(monthsWorked, 11);
      totalGranted = months;
      grantDetails.push({label:`입사 ${monthsWorked}개월차 · 발생 ${months}개`, amount:months});
    } else {
      // 1년 이상: 15개 기본, 3년차부터 2년마다 +1 (최대 25개)
      const base = 15;
      const extra = yearsWorked >= 3 ? Math.min(Math.floor((yearsWorked - 1) / 2), 10) : 0;
      const annual = Math.min(base + extra, 25);
      totalGranted = annual;
      grantDetails.push({label:`${yearsWorked}년차 연차 ${annual}개 발생`, amount:annual});
    }
  }

  const compTotal = (l.compLogs||[]).reduce((sum,c)=>sum+c.amount, 0);
  const used = (l.logs||[]).reduce((sum,r)=>sum+r.amount, 0);
  const remaining = Math.round((totalGranted + compTotal - used) * 100) / 100;

  return { totalGranted, compTotal, used, remaining, grantDetails, yearsWorked, monthsWorked };
}

function viewCompanyList(){
  const alphaFilter = state.companyAlphaFilter || 'ALL';
  let companies = state.data.companies.slice();
  if(state.companySearch){
    const q=state.companySearch.toLowerCase();
    companies=companies.filter(c=>c.name.toLowerCase().includes(q)||c.people.some(p=>p.name.toLowerCase().includes(q)));
  }
  if(alphaFilter !== 'ALL'){
    const getFirstChoseong = name => {
      const code = (name||'').charCodeAt(0);
      if(code >= 0xAC00 && code <= 0xD7A3){
        const fullInitials = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
        const map2 = {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'};
        const cho = fullInitials[Math.floor((code-0xAC00)/28/21)];
        return map2[cho]||cho;
      }
      return (name||'')[0]?.toUpperCase()||'';
    };
    companies = companies.filter(c=>getFirstChoseong(c.name)===alphaFilter||c.name[0]?.toUpperCase()===alphaFilter);
  }
  companies.sort((a,b)=>a.name.localeCompare(b.name));

  // 한글 초성 추출 함수
  const getChoseong = ch => {
    const code = ch.charCodeAt(0);
    if(code >= 0xAC00 && code <= 0xD7A3){
      const initials = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      const idx = Math.floor((code - 0xAC00) / 28 / 21);
      const fullInitials = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      const cho = fullInitials[idx];
      // ㄲ→ㄱ, ㄸ→ㄷ, ㅃ→ㅂ, ㅆ→ㅅ, ㅉ→ㅈ 통합
      const map = {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'};
      return map[cho] || cho;
    }
    if(code >= 65 && code <= 90) return ch.toUpperCase(); // A-Z
    if(code >= 97 && code <= 122) return ch.toUpperCase(); // a-z
    return ch.toUpperCase();
  };

  // 한글 ㄱㄴㄷ 순서
  const HANGUL_ORDER = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const isHangul = ch => /[ㄱ-ㅎ가-힣]/.test(ch);
  const isAlpha = ch => /[A-Za-z]/.test(ch);

  // 실제 존재하는 초성 목록 추출 + 정렬
  const allInitials = [...new Set(state.data.companies.map(c=>getChoseong(c.name[0]||'')).filter(Boolean))];
  const sortedInitials = allInitials.sort((a,b) => {
    const aH = isHangul(a), bH = isHangul(b);
    if(aH && bH) return HANGUL_ORDER.indexOf(a) - HANGUL_ORDER.indexOf(b);
    if(aH) return -1; // 한글 먼저
    if(bH) return 1;
    return a.localeCompare(b); // 영문은 알파벳순
  });

  const alphaButtons = ['ALL', ...sortedInitials].map(ch=>
    `<button class="btn ${alphaFilter===ch?'btn-o':''}" data-alpha="${ch}" style="padding:4px 8px;font-size:11px;min-width:32px">${ch}</button>`
  ).join('');

  return `
    <div class="sh">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:16px;font-weight:600">컨택</span>
        <div class="search-wrap" style="width:220px"><i class="ti ti-search"></i><input class="inp" id="companySearchInput" placeholder="회사 또는 담당자 검색" value="${state.companySearch}" style="margin:0"/></div>
      </div>
      ${!isReadOnly()?`<button class="btn btn-o" id="addCompanyBtn"><i class="ti ti-plus"></i> 회사 추가</button>`:''}
    </div>

    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">${alphaButtons}</div>

    <div class="krow" style="grid-template-columns:repeat(2,1fr);max-width:320px;margin-bottom:14px">
      <div class="kpi"><div class="kn">${companies.length}</div><div class="kl">표시 중</div></div>
      <div class="kpi"><div class="kn">${allPeopleFlat().length}</div><div class="kl">등록된 담당자</div></div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="tbl">
        <colgroup><col style="width:28%"><col style="width:10%"><col style="width:20%"><col style="width:42%"></colgroup>
        <thead><tr><th>회사명</th><th>담당자 수</th><th>메인 담당자</th><th>담당자 목록</th></tr></thead>
        <tbody>
        ${companies.length===0?`<tr><td colspan="4"><div class="empty-state">검색 결과가 없습니다.</div></td></tr>`:
          companies.map(c=>{
            const mainP = c.people.find(p=>p.isMain) || c.people[0];
            // 연결된 거래처 찾기
            const linkedVendor = state.data.vendors.find(v=>v.name===c.name);
            return `<tr class="clickable company-row" data-cid="${c.id}">
              <td><div style="display:flex;align-items:center;gap:8px">
                ${av(c.name,24)}<div>
                  <div style="font-weight:500">${c.name}</div>
                  ${linkedVendor?`<div style="font-size:10px;color:var(--o)">→ 거래처 연결됨</div>`:''}
                </div>
              </div></td>
              <td>${c.people.length}명</td>
              <td>${mainP?`<div style="display:flex;align-items:center;gap:4px">${av(mainP.name,20)}<span style="font-size:12px">${mainP.name}</span></div>`:'-'}</td>
              <td style="color:var(--muted);font-size:12px">${c.people.slice(0,3).map(p=>p.name).join(', ')}${c.people.length>3?` 외 ${c.people.length-3}명`:''}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function openModal(html){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'modalOverlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal(){
  const m = document.getElementById('modalOverlay');
  if(m) m.remove();
}

function bindEventTypesManager(){
  document.getElementById('addEventTypeBtn').addEventListener('click', ()=>{
    const name = document.getElementById('newEventTypeName').value.trim();
    const color = document.getElementById('newEventTypeColor').value;
    if(!name) return;
    const list = document.getElementById('eventTypeList');
    const idx = list.querySelectorAll('.event-type-row').length;
    const row = document.createElement('div');
    row.className = 'event-type-row';
    row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sf);border-radius:8px';
    row.innerHTML = `
      <input type="color" value="${color}" class="event-type-color" data-idx="${idx}" style="width:32px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:2px"/>
      <input type="text" value="${name}" class="inp event-type-name" data-idx="${idx}" style="flex:1;margin:0"/>
      <button class="btn btn-red event-type-delete" data-idx="${idx}" style="padding:5px 8px;font-size:12px"><i class="ti ti-x"></i></button>
    `;
    list.appendChild(row);
    row.querySelector('.event-type-delete').addEventListener('click', ()=>row.remove());
    document.getElementById('newEventTypeName').value = '';
  });
  document.querySelectorAll('.event-type-delete').forEach(btn=>{
    btn.addEventListener('click', ()=>btn.closest('.event-type-row').remove());
  });
  document.getElementById('saveEventTypesBtn').addEventListener('click', ()=>{
    const rows = document.querySelectorAll('.event-type-row');
    state.data.calendarEventTypes = Array.from(rows).map(r=>({
      name: r.querySelector('.event-type-name').value.trim(),
      color: r.querySelector('.event-type-color').value
    })).filter(t=>t.name);
    closeModal(); persist(); showToast('일정 유형이 저장되었습니다.');
  });
}

function generateMeetingSummary(text){
  const sentences = text.split(/[.。\n\r]/).map(s=>s.trim()).filter(Boolean);
  const summary = sentences.slice(0,2).join('. ') + (sentences.length>0?'.':'');
  const actionKeywords = ['필요','예정','하기로','전달','검토','보고','확인','요청','작성'];
  const candidates = sentences.filter(s=> actionKeywords.some(k=>s.includes(k)));
  const items = candidates.slice(0,5).map(s=>({text:s.replace(/^(그리고|또한|그래서)\s*/,''), deadline:''}));
  if(items.length===0 && sentences.length>0){
    items.push({text:sentences[0], deadline:''});
  }
  return {summary: summary || '요약할 내용이 없습니다.', items};
}

/* 로그 원본 -> 한 줄 요약 (간단 규칙 기반, Claude API 연동 시 교체) */
function generateOneLineSummary(text){
  const sentences = text.split(/[.。\n\r]/).map(s=>s.trim()).filter(Boolean);
  if(sentences.length===0) return '';
  let first = sentences[0];
  if(first.length>60) first = first.slice(0,57)+'...';
  return first;
}

  function bindLinkAdder(addBtnId, listId, urlInputId, labelInputId){

      const label = document.getElementById(labelInputId)?.value?.trim();
      if(!url){ showToast('링크 URL을 입력해주세요.'); return; }
      const list = document.getElementById(listId);
      if(!list) return;
      const row = document.createElement('div');
      row.className = 'link-row';
      row.style.cssText = 'display:flex;gap:6px;align-items:center';
      const cls = listId === 'editLinkList' ? 'edit-link-url' : 'link-url';
      const lcls = listId === 'editLinkList' ? 'edit-link-label' : 'link-label';
      const delCls = listId === 'editLinkList' ? 'edit-link-del' : 'link-del';
      row.innerHTML = `
        <input type="text" class="inp ${cls}" value="${url.replace(/"/g,'&quot;')}" style="flex:1;margin:0"/>
        <input type="text" class="inp ${lcls}" value="${(label||'').replace(/"/g,'&quot;')}" placeholder="이름" style="width:120px;margin:0"/>
        <button type="button" class="btn btn-red ${delCls}" style="padding:5px 8px;flex-shrink:0"><i class="ti ti-x"></i></button>
      `;
      row.querySelector(`.${delCls}`).addEventListener('click', ()=>row.remove());
      list.appendChild(row);
      if(document.getElementById(urlInputId)) document.getElementById(urlInputId).value = '';
      if(document.getElementById(labelInputId)) document.getElementById(labelInputId).value = '';
    });
    // 기존 삭제 버튼 바인딩
    document.querySelectorAll(`#${listId} .${listId==='editLinkList'?'edit-link-del':'link-del'}`).forEach(btn=>{
      btn.addEventListener('click', ()=>btn.closest('.link-row, .edit-link-row')?.remove());
    });
  }

    row.querySelector('.remove-attachment').addEventListener('click', ()=> row.remove());
  });
  document.querySelectorAll('.remove-attachment').forEach(el=>{
    el.addEventListener('click', ()=> el.closest('div').remove());
  });

  document.getElementById('checklistDetailForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
    const target = p.checklist.find(c=>c.id===item.id);
    target.text = fd.get('text');
    target.status = fd.get('status');
    target.priority = fd.get('priority');
    target.startDate = fd.get('startDate')||'';
    target.dueDate = fd.get('dueDate')||'';
    target.requester = fd.get('requester')||'';
    target.done = fd.get('status')==='완료';
    const aType = fd.get('assigneeType');
    target.assigneeType = aType;
    if(aType==='internal') target.assigneeId = fd.get('assigneeInternal')||'';
    else if(aType==='external') target.assigneeId = fd.get('assigneeExternal')||'';
    else target.assigneeId = '';
    target.attachments = Array.from(document.querySelectorAll('.attachment-input')).map(i=>i.value.trim()).filter(Boolean);
    closeModal(); persist(); showToast('체크리스트 항목이 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteChecklistBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 항목을 삭제하시겠습니까?')){
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      p.checklist = p.checklist.filter(c=>c.id!==item.id);
      closeModal(); persist(); showToast('항목이 삭제되었습니다.');
    }
  });
}

function bindCompanyFormSubmit(existingCompany){
  document.getElementById('companyForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    if(existingCompany){
      existingCompany.name = fd.get('name');
    } else {
      state.data.companies.push({id:uid('co'), name:fd.get('name'), people:[]});
    }
    closeModal(); persist(); showToast('회사 정보가 저장되었습니다.');
  });
}

function bindPersonFormSubmit(existingPerson){
  document.getElementById('personForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const company = state.data.companies.find(c=>c.id===fd.get('companyId'));
    const obj = {id: existingPerson?existingPerson.id:uid('p'), name:fd.get('name'), title:fd.get('title'), email:fd.get('email'), phone:fd.get('phone')};
    if(existingPerson){
      const idx = company.people.findIndex(p=>p.id===existingPerson.id);
      company.people[idx] = obj;
    } else {
      company.people.push(obj);
    }
    closeModal(); persist(); showToast('담당자 정보가 저장되었습니다.');
  });
}

function bindModalCommon(){
  const closeBtn = document.getElementById('closeModal');
  if(closeBtn) closeBtn.addEventListener('click', closeModal);
}

function bindVendorFormSubmit(existingVendor){
  document.getElementById('vendorForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const obj = {
      id: existingVendor ? existingVendor.id : uid('v'),
      name: fd.get('name'),
      priority: fd.get('priority'),
      companyType: fd.get('companyType') || '벤더',
      status: existingVendor?existingVendor.status:'전송',
      actionStatus: existingVendor?existingVendor.actionStatus:'',
      contact:{name:fd.get('contactName'), title:fd.get('contactTitle'), email:fd.get('contactEmail'), phone:fd.get('contactPhone')},
      notes:{discount:fd.get('discount'), payment:fd.get('payment'), moq:fd.get('moq'), creditLimit:fd.get('creditLimit')}
    };
    if(existingVendor){
      const idx = state.data.vendors.findIndex(v=>v.id===existingVendor.id);
      state.data.vendors[idx] = obj;
    } else {
      state.data.vendors.push(obj);
    }
    closeModal(); persist(); showToast('회사 정보가 저장되었습니다.');
  });
  // 모달 내 삭제 버튼 (편집 모달에서)
  const deleteBtn = document.getElementById('deleteVendorBtn');
  if(deleteBtn && existingVendor) deleteBtn.addEventListener('click', ()=>{
    if(confirm(`"${existingVendor.name}"을(를) 삭제하시겠습니까?\n연결된 로그 데이터는 유지됩니다.`)){
      state.data.vendors = state.data.vendors.filter(v=>v.id!==existingVendor.id);
      state.selectedVendorId = null;
      closeModal(); persist(); render(); showToast('삭제되었습니다.');
    }
  });
}

function bindProjectFormSubmit(existingProject){
  // 벤더 검색 필터
  const searchInput = document.getElementById('vendorSearchModal');
  if(searchInput) searchInput.addEventListener('input', e=>{
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.vendor-check-row').forEach(row=>{
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  // 선택 카운트 업데이트
  document.querySelectorAll('input[name="vendorIds"]').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const count = document.querySelectorAll('input[name="vendorIds"]:checked').length;
      const el = document.getElementById('selectedVendorCount');
      if(el) el.textContent = count > 0 ? `${count}개 선택됨` : '선택 안함';
    });
  });

  document.getElementById('projectForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    let category = fd.get('category');
    if(category==='__new__'){
      const nc = (fd.get('newCategory')||'').trim();
      category = nc || '기타';
      if(nc && !state.data.categories.includes(nc)) state.data.categories.push(nc);
    }
    const vendorIds = Array.from(document.querySelectorAll('input[name="vendorIds"]:checked')).map(cb=>cb.value);
    const obj = {
      id: existingProject ? existingProject.id : uid('p'),
      title: fd.get('title'), category, owner: fd.get('owner')||'천세나',
      deadline: fd.get('deadline')||'',
      vendorIds,
      vendorId: vendorIds[0]||'', // 하위 호환성 유지
      checklist: existingProject ? existingProject.checklist : [],
      meetingNotes: existingProject ? existingProject.meetingNotes : [],
      logs: existingProject ? (existingProject.logs||[]) : [],
      vendorLogs: existingProject ? (existingProject.vendorLogs||{}) : {} // 벤더별 로그 맵
    };
    if(existingProject){
      const idx = state.data.projects.findIndex(p=>p.id===existingProject.id);
      state.data.projects[idx] = obj;
    } else {
      state.data.projects.push(obj);
    }
    closeModal(); persist(); showToast('프로젝트가 저장되었습니다.');
  });

  const deleteBtn = document.getElementById('deleteProjectBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 프로젝트를 삭제하시겠습니까?')){
      state.data.projects = state.data.projects.filter(p=>p.id!==existingProject.id);
      state.selectedProjectId = null;
      closeModal(); persist(); showToast('프로젝트가 삭제되었습니다.');
    }
  });
}

function bindEventFormSubmit(){
  document.getElementById('eventForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const allDay = document.getElementById('allDayCheckNew')?.checked || false;
    const startTime = fd.get('startTime')||'';
    const endTime = fd.get('endTime')||'';
    const timeLabel = allDay ? '종일' : startTime ? (endTime ? startTime+'~'+endTime : startTime) : '';
    state.data.calendar.push({
      id: uid('ev'), date: fd.get('date'), type: fd.get('type'), title: fd.get('title'),
      time: timeLabel, startTime, endTime, allDay, vendorId: fd.get('vendorId')||'',
      location: fd.get('location')||'', attendees: fd.get('attendees')||'', memo: fd.get('memo')||''
    });
    closeModal(); persist(); showToast('일정이 등록되었습니다.');
  });
}

function bindDayDetailEvents(dateStr){
  document.querySelectorAll('.day-event-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(el.dataset.projectid){
        state.selectedProjectId = el.dataset.projectid;
        state.view = 'projects';
        closeModal(); render();
      }
    });
  });
  const addBtn = document.getElementById('addEventFromDayBtn');
  if(addBtn) addBtn.addEventListener('click', ()=>{
    closeModal();
    openModal(modalEventForm(dateStr));
    bindModalCommon();
    bindEventFormSubmit();
  });
}

function renderMeetingResult(result, originalText){
  const resultDiv = document.getElementById('mnResult');
  resultDiv.innerHTML = `
    <div style="border-top:0.5px solid var(--border); padding-top:14px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <i class="ti ti-sparkles" style="font-size:16px; color:var(--accent-text);"></i>
        <h3 style="margin:0;">AI 요약</h3>
      </div>
      <p style="font-size:13px; color:var(--text-muted); line-height:1.6; margin:0 0 16px;">${result.summary}</p>
      <p style="font-size:13px; font-weight:500; margin:0 0 10px;">추출된 액션 아이템 · 체크한 항목만 체크리스트에 추가됩니다</p>
      <div id="actionItemsList" style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">
        ${result.items.map((item,i)=>`
          <label style="display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--surface); border-radius:var(--radius); cursor:pointer;">
            <input type="checkbox" class="action-item-check" data-idx="${i}" checked style="width:14px; height:14px; margin-top:2px;"/>
            <span style="font-size:13px; flex:1;">${item.text}</span>
          </label>
        `).join('')}
      </div>
      <div style="display:flex; gap:8px;">
        <button type="button" id="cancelMeetingNote" style="flex:1;">취소</button>
        <button type="button" id="confirmAddItems" class="primary" style="flex:1;">체크리스트에 추가</button>
      </div>
    </div>
  `;
  document.getElementById('cancelMeetingNote').addEventListener('click', closeModal);
  document.getElementById('confirmAddItems').addEventListener('click', ()=>{
    const projectId = document.getElementById('mnProject').value;
    const date = document.getElementById('mnDate').value;
    const p = state.data.projects.find(x=>x.id===projectId);
    if(!p){ showToast('프로젝트를 찾을 수 없습니다.'); return; }

    const checks = document.querySelectorAll('.action-item-check');
    let addedCount = 0;
    checks.forEach(c=>{
      if(c.checked){
        const idx = parseInt(c.dataset.idx);
        p.checklist.push({id:uid('c'), text:result.items[idx].text, done:false});
        addedCount++;
      }
    });
    if(!p.meetingNotes) p.meetingNotes = [];
    p.meetingNotes.push({id:uid('mn'), date, text:originalText, summary:result.summary});

    closeModal();
    persist();
    showToast(`회의록이 저장되고 체크리스트에 ${addedCount}건 추가되었습니다.`);
  });
}

/* ---------- 앱 초기화 ---------- */
async function initApp(){
  const app = document.getElementById('app');
  app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text-muted);font-size:13px;">불러오는 중...</div>`;
  try{
    state.data = await loadStoreRemote();
    render();
    // 시계 위젯 시작
    startClock();
  }catch(e){
    console.error('Dashboard error:', e);
    const isNetworkError = e.message.includes('fetch') || e.message.includes('network') || e.message.includes('CORS');
    app.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:2rem;text-align:center;">
      <div style="font-size:32px;">⚠️</div>
      <p style="font-size:15px;font-weight:600;color:var(--danger);">데이터를 불러오지 못했습니다</p>
      <p style="font-size:12px;color:var(--text-muted);max-width:400px;">${e.message}</p>
      ${isNetworkError ? `<p style="font-size:12px;color:var(--text-muted);background:var(--bg);padding:10px 16px;border-radius:8px;max-width:400px;">
        Supabase 대시보드 → Project Settings → API → <strong>Allowed origins</strong>에<br>
        <code style="background:#eee;padding:2px 6px;border-radius:4px;">https://senantwglobal.github.io</code><br>
        를 추가했는지 확인해주세요.
      </p>` : ''}
      <button id="retryBtn" class="btn btn-primary">다시 시도</button>
    </div>`;
    document.getElementById('retryBtn').addEventListener('click', initApp);
  }
}
initApp();
</script>
