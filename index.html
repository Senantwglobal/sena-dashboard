:root{

  --bg-danger:#FCEBEB; --text-danger:#A32D2D; --fill-danger:#E24B4A;
  --bg-success:#EAF3DE; --text-success:#3B6D11; --fill-success:#639922;
  --bg-warning:#FAEEDA; --text-warning:#854F0B; --fill-warning:#EF9F27;
  --bg-pro:#EEEDFE; --text-pro:#3C3489; --fill-pro:#7F77DD;
  --bg-coral:#FAECE7; --text-coral:#993C1D;
  --bg-teal:#E1F5EE; --text-teal:#0F6E56;
  --radius:8px; --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Malgun Gothic',sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --surface-0:#1c1c1a; --surface-1:#252522; --surface-2:#2b2b28;
    --text-primary:#f0efe9; --text-secondary:#b4b2a9; --text-muted:#888780;
    --border:#3a3a36; --border-strong:#4a4a45;
    --bg-accent:#1E3A8A; --text-accent:#A8C0F5; --on-accent:#ffffff;
    --bg-danger:#791F1F; --text-danger:#F7C1C1;
    --bg-success:#27500A; --text-success:#C0DD97;
    --bg-warning:#633806; --text-warning:#FAC775;
    --bg-pro:#3C3489; --text-pro:#CECBF6;
    --bg-coral:#712B13; --text-coral:#F0997B;
    --bg-teal:#085041; --text-teal:#9FE1CB;
  }
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:var(--font-sans); background:var(--surface-0); color:var(--text-primary);
  font-size:14px; line-height:1.6;
}
h1,h2,h3{font-weight:500; margin:0;}
h1{font-size:22px;} h2{font-size:18px;} h3{font-size:16px;}
button{
  font-family:inherit; font-size:13px; padding:8px 14px; border-radius:var(--radius);
  border:0.5px solid var(--border-strong); background:transparent; color:var(--text-primary);
  cursor:pointer; transition:background .12s;
}
button:hover{background:var(--surface-1);}
button:active{transform:scale(0.98);}
button.primary{background:var(--fill-accent); color:var(--on-accent); border-color:transparent;}
button.primary:hover{background:#2f78c2;}
button.danger-text{color:var(--text-danger); border-color:var(--bg-danger);}
input,select,textarea{
  font-family:inherit; font-size:13px; padding:8px 10px; border-radius:var(--radius);
  border:0.5px solid var(--border); background:var(--surface-1); color:var(--text-primary);
  width:100%;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--border-accent); box-shadow:0 0 0 2px var(--bg-accent);}
label{font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;}
.field{margin-bottom:12px;}
.app{display:flex; min-height:100vh;}
.sidebar{

.sidebar-title{padding:0 1rem 1rem; font-size:13px; font-weight:500; color:var(--text-secondary);}
.nav-item{

.nav-item:hover{background:var(--surface-0);}
.nav-item.active{background:var(--bg-accent); color:var(--text-accent); font-weight:500; border-left-color:var(--border-accent);}
.nav-item i{font-size:16px;}

.row{display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; gap:12px; flex-wrap:wrap;}

.metric-card{background:var(--surface-1); border-radius:var(--radius); padding:1rem;}
.metric-card p.label{font-size:13px; color:var(--text-secondary); margin:0 0 4px;}
.metric-card p.value{font-size:24px; font-weight:500; margin:0;}
.card{background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:1.25rem;}
.badge{font-size:11px; padding:2px 8px; border-radius:var(--radius); display:inline-block; font-weight:500;}
table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; padding:8px 12px; font-weight:500; color:var(--text-secondary); background:var(--surface-1);}
td{padding:8px 12px; border-top:0.5px solid var(--border);}
tr.clickable{cursor:pointer;}
tr.clickable:hover td{background:var(--surface-1);}
.table-wrap{background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; overflow:hidden;}
.tag{font-size:12px; padding:4px 10px; border-radius:var(--radius); border:0.5px solid var(--border-strong); cursor:pointer; background:var(--surface-1); color:var(--text-secondary);}

.proj-card{background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:1rem; cursor:pointer;}

.progress-bar{height:4px; background:var(--surface-1); border-radius:2px; overflow:hidden; margin-top:10px;}

.modal-overlay{

  z-index:100; padding:1.5rem;

.modal{background:var(--surface-2); border-radius:12px; border:0.5px solid var(--border); padding:1.25rem; width:420px; max-width:100%; max-height:85vh; overflow-y:auto;}

.close-x{cursor:pointer; color:var(--text-secondary); font-size:18px;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; font-size:12px;}

.cal-cell{background:var(--surface-2); min-height:78px; padding:4px; cursor:pointer;}

.cal-event{margin-top:2px; font-size:10px; padding:1px 4px; border-radius:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--text-secondary); margin-bottom:1rem;}

<script>
/* ============================================================
   경량 날짜 유틸 (dayjs 대체 - 외부 CDN 의존 제거)
   ============================================================ */
function dayjs(input){
  let d;
  if(input===undefined) d = new Date();
  else if(input instanceof Date) d = new Date(input);
  else if(typeof input === 'string'){
    d = new Date(input.length<=10 ? input+'T00:00:00' : input);
  } else d = new Date(input);

  const obj = {
    _d: d,
    format(fmt){
      const Y = d.getFullYear(), M = d.getMonth()+1, D = d.getDate();
      const dowNames = ['일','월','화','수','목','금','토'];
      const dow = dowNames[d.getDay()];
      const h = d.getHours(), m = d.getMinutes();
      const pad = n => String(n).padStart(2,'0');
      return fmt
        .replace(/YYYY/g, Y)
        .replace(/MM/g, pad(M))
        .replace(/M/g, M)
        .replace(/DD/g, pad(D))
        .replace(/D/g, D)
        .replace(/ddd/g, dow)
        .replace(/HH/g, pad(h))
        .replace(/mm/g, pad(m));
    },
    add(n, unit){
      const nd = new Date(d);
      if(unit==='day') nd.setDate(nd.getDate()+n);
      else if(unit==='month') nd.setMonth(nd.getMonth()+n);
      else if(unit==='year') nd.setFullYear(nd.getFullYear()+n);
      return dayjs(nd);
    },
    subtract(n, unit){ return obj.add(-n, unit); },
    diff(other, unit){
      const od = other._d ? other._d : new Date(other);
      const ms = d.getTime() - od.getTime();
      if(unit==='day') return Math.round(ms/86400000);
      if(unit==='month') return (d.getFullYear()-od.getFullYear())*12 + (d.getMonth()-od.getMonth());
      return ms;
    },
    date(n){
      if(n===undefined) return d.getDate();
      const nd = new Date(d); nd.setDate(n); return dayjs(nd);
    },
    day(){ return d.getDay(); },
    startOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setDate(1); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    endOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setMonth(nd.getMonth()+1); nd.setDate(0); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    isValid(){ return !isNaN(d.getTime()); }
  };
  return obj;
}

   데이터 저장: Supabase (app_data 테이블, id='main' 단일 행에 JSON 저장)
   ============================================================ */

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZG9zcGRwaGxrY2p5dmRsdWtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDAyNTEsImV4cCI6MjA5ODM3NjI1MX0.o9IRhp5dsUark4xD3QnOieLdjA52JAcZMPXx-VmZNfU';
const SUPABASE_TABLE = 'app_data';
const SUPABASE_ROW_ID = 'main';

async function supabaseFetch(path, options={}){
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers||{})
    }
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Supabase error ${res.status}: ${text}`);
  }
  return res.json();
}

async function loadStoreRemote(){
  const rows = await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}&select=data`);
  if(rows && rows.length>0 && rows[0].data && Object.keys(rows[0].data).length>0){
    return rows[0].data;
  }
  // 행이 비어있으면 시드 데이터로 초기 저장
  const seed = seedData();
  await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ data: seed })
  });
  return seed;
}

let saveTimer = null;
let saveInFlight = false;
let savePending = false;

function saveStore(){
  // 디바운스: 짧은 시간 내 연속 저장 요청을 묶어서 한 번만 전송
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSaveStore, 400);
}

async function doSaveStore(){
  if(saveInFlight){ savePending = true; return; }
  saveInFlight = true;
  try{
    await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ data: state.data, updated_at: new Date().toISOString() })
    });
    setSyncStatus('synced');
  }catch(e){
    console.error('저장 실패:', e);
    setSyncStatus('error');
  }finally{
    saveInFlight = false;
    if(savePending){ savePending = false; doSaveStore(); }
  }
}

function setSyncStatus(status){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(status==='saving'){ el.textContent = '저장 중...'; el.style.color = 'var(--text-muted)'; }
  else if(status==='synced'){ el.textContent = '저장됨'; el.style.color = 'var(--text-success)'; }
  else if(status==='error'){ el.textContent = '저장 실패 (연결 확인)'; el.style.color = 'var(--text-danger)'; }
}

function persist(){ setSyncStatus('saving'); saveStore(); render(); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- 유틸 ---------- */
function daysAgo(dateStr){
  if(!dateStr) return null;
  return dayjs().diff(dayjs(dateStr), 'day');
}
function fmtDate(d){ return dayjs(d).format('M월 D일'); }
function fmtDateDow(d){ return dayjs(d).format('M월 D일 (ddd)'); }

function latestLogForVendor(vendorId){
  const logs = state.data.vendorLogs.filter(l=>l.vendorId===vendorId);
  if(logs.length===0) return null;
  return logs.slice().sort((a,b)=> dayjs(b.date).diff(dayjs(a.date)))[0];
}
function logsForVendor(vendorId){
  return state.data.vendorLogs.filter(l=>l.vendorId===vendorId).slice().sort((a,b)=> dayjs(b.date).diff(dayjs(a.date)));
}
function projectsForVendor(vendorId){
  return state.data.projects.filter(p=>p.vendorId===vendorId);
}
function progressOf(project){
  if(!project.checklist.length) return 0;
  const done = project.checklist.filter(c=>c.done).length;
  return Math.round(done/project.checklist.length*100);
}
function priorityColor(p){
  if(p==='높음') return {bg:'var(--bg-danger)', text:'var(--text-danger)'};
  if(p==='보통') return {bg:'var(--bg-warning)', text:'var(--text-warning)'};
  if(p==='완료') return {bg:'var(--surface-1)', text:'var(--text-secondary)'};
  return {bg:'var(--bg-success)', text:'var(--text-success)'};
}
function eventColor(type){
  if(type==='미팅') return {bg:'var(--bg-accent)', text:'var(--text-accent)', dot:'#2554C7'};
  if(type==='외근') return {bg:'var(--bg-coral)', text:'var(--text-coral)', dot:'#D85A30'};
  if(type==='마감') return {bg:'var(--bg-pro)', text:'var(--text-pro)', dot:'#7F77DD'};
  if(type==='연차') return {bg:'var(--bg-success)', text:'var(--text-success)', dot:'#1D9E75'};
  return {bg:'var(--surface-1)', text:'var(--text-secondary)', dot:'#888780'};
}
function allCalendarEvents(){
  const evs = state.data.calendar.map(e=>({...e}));
  state.data.projects.forEach(p=>{
    if(p.deadline){
      evs.push({id:'deadline_'+p.id, date:p.deadline, type:'마감', title:p.title+' 마감', time:'', projectId:p.id});
    }
  });
  return evs;
}
function eventsOnDate(dateStr){
  return allCalendarEvents().filter(e=>e.date===dateStr);
}

  else if(state.view==='leave') root.innerHTML = viewLeave();

  bindViewEvents();
}

function navItem(view, icon, label){
  const active = state.view===view ? 'active' : '';
  return `<div class="nav-item ${active}" data-view="${view}"><i class="ti ${icon}"></i>${label}</div>`;
}

const isReadOnly = () => state.data.role === 'ceo';

    .map(v=>({...v, latest:latestLogForVendor(v.id)}))

    .sort((a,b)=> daysAgo(b.latest.date) - daysAgo(a.latest.date));

      <div class="metric-card"><p class="label">마감 임박 (7일 이내)</p><p class="value" style="color:var(--text-danger)">${upcomingDeadlines.length}건</p></div>
      <div class="metric-card"><p class="label">정체 벤더 (90일+)</p><p class="value" style="color:var(--text-warning)">${staleVendors.length}건</p></div>
      <div class="metric-card"><p class="label">전체 벤더</p><p class="value">${state.data.vendors.length}</p></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
      <div class="card">
        <h3 style="margin-bottom:10px;">오늘 일정</h3>
        ${todayEvents.length===0 ? '<p style="font-size:13px;color:var(--text-muted)">오늘 등록된 일정이 없습니다.</p>' :
          todayEvents.map(e=>{
            const c = eventColor(e.type);
            return `<div style="display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px;">
              <span style="width:7px;height:7px;border-radius:50%;background:${c.dot};flex-shrink:0;"></span>
              <span>${e.time?e.time+' · ':''}${e.title}</span>
            </div>`;
          }).join('')}
      </div>

      <div class="card">
        <h3 style="margin-bottom:10px;">마감 임박 프로젝트</h3>
        ${upcomingDeadlines.length===0 ? '<p style="font-size:13px;color:var(--text-muted)">임박한 마감일이 없습니다.</p>' :
          upcomingDeadlines.map(p=>`
            <div class="proj-link" data-pid="${p.id}" style="display:flex; justify-content:space-between; padding:6px 0; font-size:13px; cursor:pointer;">
              <span>${p.title}</span>
              <span style="color:${p.dday<=2?'var(--text-danger)':'var(--text-secondary)'}">D-${p.dday}</span>
            </div>`).join('')}
      </div>
    </div>

    ${staleVendors.length>0 ? `
    <div class="card" style="margin-bottom:1rem; border-color:var(--bg-warning);">
      <h3 style="margin-bottom:10px; display:flex; align-items:center; gap:6px;"><i class="ti ti-alert-triangle" style="color:var(--text-warning); font-size:16px;"></i>90일 이상 방치된 벤더</h3>
      ${staleVendors.map(v=>`
        <div class="vendor-link" data-vid="${v.id}" style="display:flex; justify-content:space-between; padding:6px 0; font-size:13px; cursor:pointer;">

          <span style="font-size:13px;"><strong style="font-weight:500">${v?v.name:''}</strong> · ${l.summary}</span>

/* ---------- 벤더 리스트 ---------- */
function viewVendorList(){
  let vendors = state.data.vendors.map(v=>({...v, latest:latestLogForVendor(v.id)}));
  if(state.vendorSearch){
    const q = state.vendorSearch.toLowerCase();
    vendors = vendors.filter(v=> v.name.toLowerCase().includes(q) || (v.contact.name||'').toLowerCase().includes(q));
  }
  vendors.sort((a,b)=>{
    const da = a.latest ? daysAgo(a.latest.date) : -1;
    const db = b.latest ? daysAgo(b.latest.date) : -1;
    return db - da;
  });

  const highCount = state.data.vendors.filter(v=>v.priority==='높음').length;
  const waitingCount = state.data.vendors.filter(v=>{const l=latestLogForVendor(v.id); return l && (l.status==='전송'||l.status==='수신');}).length;
  const staleCount = vendors.filter(v=>v.latest && daysAgo(v.latest.date)>=90).length;

  return `
    <div class="row">
      <h1>벤더</h1>
      <div style="display:flex; gap:8px; align-items:center;">
        <div class="search-bar"><i class="ti ti-search"></i><input id="vendorSearchInput" placeholder="브랜드 또는 담당자 검색" value="${state.vendorSearch}"/></div>
        ${!isReadOnly() ? '<button class="primary" id="addVendorBtn"><i class="ti ti-plus"></i> 벤더 추가</button>' : ''}
      </div>
    </div>

    <div class="metric-grid">
      <div class="metric-card"><p class="label">전체 브랜드</p><p class="value">${state.data.vendors.length}</p></div>
      <div class="metric-card"><p class="label">우선순위 높음</p><p class="value" style="color:var(--text-danger)">${highCount}</p></div>
      <div class="metric-card"><p class="label">회신 대기</p><p class="value">${waitingCount}</p></div>
      <div class="metric-card"><p class="label">90일 이상 정체</p><p class="value" style="color:var(--text-warning)">${staleCount}</p></div>
    </div>

    <div class="table-wrap">
      <table>
        <colgroup><col style="width:18%"><col style="width:10%"><col style="width:32%"><col style="width:12%"><col style="width:12%"><col style="width:16%"></colgroup>
        <thead><tr><th>브랜드</th><th>경과일</th><th>최근 상황</th><th>상태</th><th>우선순위</th><th>담당자</th></tr></thead>
        <tbody>
        ${vendors.length===0 ? `<tr><td colspan="6"><div class="empty-state">검색 결과가 없습니다.</div></td></tr>` :
          vendors.map(v=>{
            const days = v.latest ? daysAgo(v.latest.date) : null;
            const pr = priorityColor(v.priority);
            return `<tr class="clickable vendor-row" data-vid="${v.id}">
              <td style="font-weight:500">${v.name}</td>
              <td style="${days>=90?'color:var(--text-danger)':''}">${days!==null?days+'일':'-'}</td>
              <td style="color:var(--text-secondary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:1px;">${v.latest?v.latest.summary:'-'}</td>
              <td><span class="badge" style="background:var(--surface-1); color:var(--text-secondary);">${v.latest?v.latest.status:'-'}</span></td>
              <td><span class="badge" style="background:${pr.bg}; color:${pr.text};">${v.priority}</span></td>
              <td style="color:var(--text-secondary)">${v.contact.name}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

function checklistAssigneeName(c){
  if(!c.assigneeId) return '';
  if(c.assigneeType==='internal') return c.assigneeId;
  const people = allPeopleFlat();
  const person = people.find(p=>p.id===c.assigneeId);
  return person ? `${person.companyName} · ${person.name}` : '';
}
function checklistStatusColor(status){
  if(status==='완료') return {bg:'var(--bg-success)', text:'var(--text-success)'};
  if(status==='진행중') return {bg:'var(--bg-accent)', text:'var(--text-accent)'};
  if(status==='보류') return {bg:'var(--bg-warning)', text:'var(--text-warning)'};
  return {bg:'var(--surface-1)', text:'var(--text-secondary)'};
}


/* ---------- 캘린더 ---------- */
function viewCalendar(){
  const month = dayjs(state.calMonth+'-01');
  const startOfMonth = month.startOf('month');
  const endOfMonth = month.endOf('month');
  const startDay = startOfMonth.day();
  const daysInMonth = endOfMonth.date();
  const todayStr = dayjs().format('YYYY-MM-DD');

  let cells = [];
  for(let i=0;i<startDay;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const dowNames = ['일','월','화','수','목','금','토'];

  return `
    <div class="row">
      <div style="display:flex; align-items:center; gap:12px;">
        <i class="ti ti-chevron-left" id="prevMonth" style="font-size:18px; cursor:pointer;"></i>
        <h2 style="margin:0">${month.format('YYYY년 M월')}</h2>
        <i class="ti ti-chevron-right" id="nextMonth" style="font-size:18px; cursor:pointer;"></i>
      </div>
      ${!isReadOnly() ? `<button class="primary" id="addEventBtnTop"><i class="ti ti-plus"></i> 일정 등록</button>` : ''}
    </div>

    <div class="legend">
      <span><span class="dot" style="background:#2554C7"></span>미팅</span>
      <span><span class="dot" style="background:#D85A30"></span>외근</span>
      <span><span class="dot" style="background:#7F77DD"></span>프로젝트 마감</span>
      <span><span class="dot" style="background:#1D9E75"></span>연차/반차</span>
    </div>

    <div class="cal-grid">
      ${dowNames.map(d=>`<div class="cal-head">${d}</div>`).join('')}
      ${cells.map(d=>{
        if(d===null) return `<div class="cal-cell" style="cursor:default;"></div>`;
        const dateStr = month.date(d).format('YYYY-MM-DD');
        const evs = eventsOnDate(dateStr);
        const isToday = dateStr===todayStr;
        return `<div class="cal-cell" data-date="${dateStr}">
          <span class="daynum ${isToday?'today':''}">${d}</span>
          ${evs.slice(0,3).map(e=>{
            const c = eventColor(e.type);
            return `<div class="cal-event" style="background:${c.bg}; color:${c.text};">${e.title}</div>`;
          }).join('')}
          ${evs.length>3?`<div style="font-size:10px; color:var(--text-muted); margin-top:2px;">+${evs.length-3}건</div>`:''}
        </div>`;
      }).join('')}
    </div>
  `;
}

/* 간단한 규칙 기반 요약/액션아이템 추출 (Claude API 연동 시 이 함수를 교체) */
function generateMeetingSummary(text){
  const sentences = text.split(/[.。\n]/).map(s=>s.trim()).filter(Boolean);
  const summary = sentences.slice(0,2).join('. ') + (sentences.length>0?'.':'');
  const actionKeywords = ['필요','예정','하기로','전달','검토','보고','확인','요청','작성'];
  const candidates = sentences.filter(s=> actionKeywords.some(k=>s.includes(k)));
  const items = candidates.slice(0,5).map(s=>({text:s.replace(/^(그리고|또한|그래서)\s*/,''), deadline:''}));
  if(items.length===0 && sentences.length>0){
    items.push({text:sentences[0], deadline:''});
  }
  return {summary: summary || '요약할 내용이 없습니다.', items};
}

/* 로그 원본 -> 한 줄 요약 (간단 규칙 기반, Claude API 연동 시 교체) */
function generateOneLineSummary(text){
  const sentences = text.split(/[.。\n]/).map(s=>s.trim()).filter(Boolean);
  if(sentences.length===0) return '';
  let first = sentences[0];
  if(first.length>60) first = first.slice(0,57)+'...';
  return first;
}

function bindViewEvents(){
  // 홈/리스트 -> 상세 이동 링크들
  document.querySelectorAll('.vendor-link, .vendor-row').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.selectedVendorId = el.dataset.vid;
      state.view = 'vendors';
      render();
    });
  });
  document.querySelectorAll('.proj-link, .proj-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.selectedProjectId = el.dataset.pid;
      state.view = 'projects';
      render();
    });
  });

  // 벤더 검색
  const vSearch = document.getElementById('vendorSearchInput');
  if(vSearch){
    vSearch.addEventListener('input', e=>{
      state.vendorSearch = e.target.value;
      render();
      document.getElementById('vendorSearchInput').focus();
      const val = document.getElementById('vendorSearchInput');
      val.setSelectionRange(val.value.length, val.value.length);
    });
  }

  // 벤더 추가/편집/삭제
  const addVendorBtn = document.getElementById('addVendorBtn');
  if(addVendorBtn) addVendorBtn.addEventListener('click', ()=>{ openModal(modalVendorForm(null)); bindModalCommon(); bindVendorFormSubmit(null); });

  const editVendorBtn = document.getElementById('editVendorBtn');
  if(editVendorBtn) editVendorBtn.addEventListener('click', ()=>{
    const v = state.data.vendors.find(x=>x.id===state.selectedVendorId);
    openModal(modalVendorForm(v)); bindModalCommon(); bindVendorFormSubmit(v);
  });

  const backToVendors = document.getElementById('backToVendors');
  if(backToVendors) backToVendors.addEventListener('click', ()=>{ state.selectedVendorId=null; render(); });

  const addVendorLogBtn = document.getElementById('addVendorLogBtn');
  if(addVendorLogBtn) addVendorLogBtn.addEventListener('click', ()=>{
    openModal(modalVendorLogForm(state.selectedVendorId)); bindModalCommon();
    document.getElementById('vlAiSummarizeBtn').addEventListener('click', ()=>{
      const raw = document.getElementById('vlRawText').value.trim();
      if(!raw){ showToast('원본 내용을 입력해주세요.'); return; }
      document.getElementById('vlSummaryInput').value = generateOneLineSummary(raw);
      showToast('AI 요약이 생성되었습니다.');
    });
    document.getElementById('vendorLogForm').addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      state.data.vendorLogs.push({
        id: uid('vl'), vendorId: fd.get('vendorId'), date: fd.get('date'), type: fd.get('type'),
        status: fd.get('status'), priority: fd.get('priority'), summary: fd.get('summary'), nextStep: fd.get('nextStep')||'',
        rawText: fd.get('rawText')||''
      });
      const v = state.data.vendors.find(x=>x.id===fd.get('vendorId'));
      if(v) v.priority = fd.get('priority');
      closeModal(); persist(); showToast('로그가 저장되었습니다.');
    });
  });

  // 로그 상세 (원본 보기)
  document.querySelectorAll('.log-detail-row').forEach(el=>{
    el.addEventListener('click', ()=>{
      const log = state.data.vendorLogs.find(l=>l.id===el.dataset.lid);
      if(!log || !log.rawText) return;
      const v = state.data.vendors.find(x=>x.id===log.vendorId);
      openModal(modalLogDetail(log, v?v.name:''));
      bindModalCommon();
    });
  });

  // 프로젝트 카테고리 필터
  document.querySelectorAll('.tag').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.projectFilter = el.dataset.cat;
      render();
    });
  });

  // 프로젝트 추가/편집/삭제
  const addProjectBtn = document.getElementById('addProjectBtn');
  if(addProjectBtn) addProjectBtn.addEventListener('click', ()=>{ openModal(modalProjectForm(null)); bindModalCommon(); bindProjectFormSubmit(null); bindCategorySelect(); });

  const editProjectBtn = document.getElementById('editProjectBtn');
  if(editProjectBtn) editProjectBtn.addEventListener('click', ()=>{
    const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
    openModal(modalProjectForm(p)); bindModalCommon(); bindProjectFormSubmit(p); bindCategorySelect();
  });

  const backToProjects = document.getElementById('backToProjects');
  if(backToProjects) backToProjects.addEventListener('click', ()=>{ state.selectedProjectId=null; render(); });

  // 체크리스트 토글/삭제/상세
  document.querySelectorAll('.checklist-toggle').forEach(el=>{
    el.addEventListener('click', e=> e.stopPropagation());
    el.addEventListener('change', ()=>{
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      const item = p.checklist.find(c=>c.id===el.dataset.cid);
      item.done = el.checked;
      item.status = el.checked ? '완료' : (item.status==='완료' ? '진행중' : item.status);
      persist();
    });
  });
  document.querySelectorAll('.checklist-delete').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      p.checklist = p.checklist.filter(c=>c.id!==el.dataset.cid);
      persist();
    });
  });
  document.querySelectorAll('.checklist-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      const item = p.checklist.find(c=>c.id===el.dataset.cid);
      openModal(modalChecklistDetail(item));
      bindModalCommon();
      bindChecklistDetailForm(item);
    });
  });
  const addChecklistItemBtn = document.getElementById('addChecklistItemBtn');
  if(addChecklistItemBtn) addChecklistItemBtn.addEventListener('click', ()=>{
    const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
    const newItem = {id:uid('c'), text:'새 항목', done:false, status:'대기', priority:'보통', startDate:'', dueDate:'', requester:'', assigneeType:'', assigneeId:'', attachments:[]};
    p.checklist.push(newItem);
    saveStore();
    openModal(modalChecklistDetail(newItem));
    bindModalCommon();
    bindChecklistDetailForm(newItem);
  });

  // 회의록
  const addMeetingNoteBtn = document.getElementById('addMeetingNoteBtn');
  if(addMeetingNoteBtn) addMeetingNoteBtn.addEventListener('click', ()=>{
    openModal(modalMeetingNoteForm());
    bindModalCommon();
    const projSel = document.getElementById('mnProject');
    if(state.selectedProjectId) projSel.value = state.selectedProjectId;
    document.getElementById('mnGenerateBtn').addEventListener('click', ()=>{
      const text = document.getElementById('mnText').value.trim();
      if(!text){ showToast('회의 내용을 입력해주세요.'); return; }
      const result = generateMeetingSummary(text);
      renderMeetingResult(result, text);
    });
  });

  // 컨택 (회사/담당자)
  document.querySelectorAll('.company-row').forEach(el=>{
    el.addEventListener('click', ()=>{ state.selectedCompanyId = el.dataset.cid; render(); });
  });
  const companySearchInput = document.getElementById('companySearchInput');
  if(companySearchInput){
    companySearchInput.addEventListener('input', e=>{
      state.companySearch = e.target.value;
      render();
      const val = document.getElementById('companySearchInput');
      val.focus(); val.setSelectionRange(val.value.length, val.value.length);
    });
  }
  const addCompanyBtn = document.getElementById('addCompanyBtn');
  if(addCompanyBtn) addCompanyBtn.addEventListener('click', ()=>{ openModal(modalCompanyForm(null)); bindModalCommon(); bindCompanyFormSubmit(null); });

  const backToCompanies = document.getElementById('backToCompanies');
  if(backToCompanies) backToCompanies.addEventListener('click', ()=>{ state.selectedCompanyId=null; render(); });

  const editCompanyBtn = document.getElementById('editCompanyBtn');
  if(editCompanyBtn) editCompanyBtn.addEventListener('click', ()=>{
    const c = state.data.companies.find(x=>x.id===state.selectedCompanyId);
    openModal(modalCompanyForm(c)); bindModalCommon(); bindCompanyFormSubmit(c);
  });

  const addPersonBtn = document.getElementById('addPersonBtn');
  if(addPersonBtn) addPersonBtn.addEventListener('click', ()=>{
    openModal(modalPersonForm(state.selectedCompanyId, null)); bindModalCommon(); bindPersonFormSubmit(null);
  });
  document.querySelectorAll('.edit-person-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      const c = state.data.companies.find(x=>x.id===state.selectedCompanyId);
      const person = c.people.find(p=>p.id===el.dataset.pid);
      openModal(modalPersonForm(c.id, person)); bindModalCommon(); bindPersonFormSubmit(person);
    });
  });
  document.querySelectorAll('.delete-person-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(confirm('이 담당자를 삭제하시겠습니까?')){
        const c = state.data.companies.find(x=>x.id===state.selectedCompanyId);
        c.people = c.people.filter(p=>p.id!==el.dataset.pid);
        persist(); showToast('담당자가 삭제되었습니다.');
      }
    });
  });

  // 프로젝트 활동 로그
  const addProjectLogBtn = document.getElementById('addProjectLogBtn');
  if(addProjectLogBtn) addProjectLogBtn.addEventListener('click', ()=>{
    openModal(modalProjectLogForm(state.selectedProjectId)); bindModalCommon();
    document.getElementById('projectLogForm').addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const p = state.data.projects.find(x=>x.id===fd.get('projectId'));
      if(!p.logs) p.logs = [];
      p.logs.push({id:uid('pl'), date:fd.get('date'), text:fd.get('text')});
      closeModal(); persist(); showToast('프로젝트 로그가 저장되었습니다.');
    });
  });

  // 로그 입력 폼 - AI 요약
  const logAiSummarizeBtn = document.getElementById('logAiSummarizeBtn');
  if(logAiSummarizeBtn) logAiSummarizeBtn.addEventListener('click', ()=>{
    const raw = document.getElementById('logRawText').value.trim();
    if(!raw){ showToast('원본 내용을 입력해주세요.'); return; }
    document.getElementById('logSummaryInput').value = generateOneLineSummary(raw);
    showToast('AI 요약이 생성되었습니다.');
  });


  // 캘린더
  const prevMonth = document.getElementById('prevMonth');
  if(prevMonth) prevMonth.addEventListener('click', ()=>{ state.calMonth = dayjs(state.calMonth+'-01').subtract(1,'month').format('YYYY-MM'); render(); });
  const nextMonth = document.getElementById('nextMonth');
  if(nextMonth) nextMonth.addEventListener('click', ()=>{ state.calMonth = dayjs(state.calMonth+'-01').add(1,'month').format('YYYY-MM'); render(); });

  document.querySelectorAll('.cal-cell[data-date]').forEach(el=>{
    el.addEventListener('click', ()=>{
      openModal(modalDayDetail(el.dataset.date));
      bindModalCommon();
      bindDayDetailEvents(el.dataset.date);
    });
  });

  const addEventBtnTop = document.getElementById('addEventBtnTop');
  if(addEventBtnTop) addEventBtnTop.addEventListener('click', ()=>{
    openModal(modalEventForm(null)); bindModalCommon(); bindEventFormSubmit();
  });

  // 로그 입력 폼
  const logForm = document.getElementById('logForm');
  if(logForm) logForm.addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.vendorLogs.push({
      id: uid('vl'), vendorId: fd.get('vendorId'), date: fd.get('date'), type: fd.get('type'),
      status: fd.get('status'), priority: fd.get('priority'), summary: fd.get('summary'), nextStep: fd.get('nextStep')||'',
      rawText: fd.get('rawText')||''
    });
    const v = state.data.vendors.find(x=>x.id===fd.get('vendorId'));
    if(v) v.priority = fd.get('priority');
    e.target.reset();
    showToast('로그가 저장되었습니다.');
    persist();
  });

  // 연차
  const addLeaveBtn = document.getElementById('addLeaveBtn');
  if(addLeaveBtn) addLeaveBtn.addEventListener('click', ()=>{
    openModal(`
      <div class="modal">
        <div class="row"><h3>연차 사용 기록 추가</h3><i class="ti ti-x close-x" id="closeModal"></i></div>
        <form id="leaveForm">
          <div class="field"><label>날짜</label><input type="date" name="date" value="${dayjs().format('YYYY-MM-DD')}" required/></div>
          <div class="field"><label>구분</label><select name="type"><option>연차</option><option>반차</option><option>반반차</option><option>대체휴무</option></select></div>
          <div class="field"><label>사용량</label><input type="number" step="0.25" name="amount" value="1" required/></div>
          <div class="field"><label>메모</label><input type="text" name="memo"/></div>
          <button type="submit" class="primary" style="width:100%;">저장</button>
        </form>
      </div>
    `);
    bindModalCommon();
    document.getElementById('leaveForm').addEventListener('submit', e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const amount = parseFloat(fd.get('amount'));
      state.data.leave.logs.push({id:uid('lv'), date:fd.get('date'), type:fd.get('type'), amount, memo:fd.get('memo')||''});
      state.data.leave.used = Math.round((state.data.leave.used + amount)*100)/100;
      closeModal(); persist(); showToast('연차 기록이 저장되었습니다.');
    });
  });
}

function bindCategorySelect(){
  const sel = document.querySelector('select[name=category]');
  if(!sel) return;
  sel.addEventListener('change', ()=>{
    document.getElementById('newCatField').style.display = sel.value==='__new__' ? 'block' : 'none';
  });
}

function bindChecklistDetailForm(item){
  const typeSel = document.getElementById('assigneeTypeSelect');
  typeSel.addEventListener('change', ()=>{
    document.getElementById('assigneeInternalField').style.display = typeSel.value==='internal' ? 'block' : 'none';
    document.getElementById('assigneeExternalField').style.display = typeSel.value==='external' ? 'block' : 'none';
  });

  let attachments = (item.attachments||[]).slice();
  document.getElementById('addAttachmentBtn').addEventListener('click', ()=>{
    const list = document.getElementById('attachmentList');
    const idx = list.children.length;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:6px; align-items:center;';
    row.innerHTML = `<input type="text" class="attachment-input" placeholder="https://..." style="flex:1;"/><i class="ti ti-x remove-attachment" style="cursor:pointer; color:var(--text-muted);"></i>`;
    list.appendChild(row);
    row.querySelector('.remove-attachment').addEventListener('click', ()=> row.remove());
  });
  document.querySelectorAll('.remove-attachment').forEach(el=>{
    el.addEventListener('click', ()=> el.closest('div').remove());
  });

  document.getElementById('checklistDetailForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
    const target = p.checklist.find(c=>c.id===item.id);
    target.text = fd.get('text');
    target.status = fd.get('status');
    target.priority = fd.get('priority');
    target.startDate = fd.get('startDate')||'';
    target.dueDate = fd.get('dueDate')||'';
    target.requester = fd.get('requester')||'';
    target.done = fd.get('status')==='완료';
    const aType = fd.get('assigneeType');
    target.assigneeType = aType;
    if(aType==='internal') target.assigneeId = fd.get('assigneeInternal')||'';
    else if(aType==='external') target.assigneeId = fd.get('assigneeExternal')||'';
    else target.assigneeId = '';
    target.attachments = Array.from(document.querySelectorAll('.attachment-input')).map(i=>i.value.trim()).filter(Boolean);
    closeModal(); persist(); showToast('체크리스트 항목이 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteChecklistBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 항목을 삭제하시겠습니까?')){
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      p.checklist = p.checklist.filter(c=>c.id!==item.id);
      closeModal(); persist(); showToast('항목이 삭제되었습니다.');
    }
  });
}

function bindCompanyFormSubmit(existingCompany){
  document.getElementById('companyForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    if(existingCompany){
      existingCompany.name = fd.get('name');
    } else {
      state.data.companies.push({id:uid('co'), name:fd.get('name'), people:[]});
    }
    closeModal(); persist(); showToast('회사 정보가 저장되었습니다.');
  });
}

function bindPersonFormSubmit(existingPerson){
  document.getElementById('personForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const company = state.data.companies.find(c=>c.id===fd.get('companyId'));
    const obj = {id: existingPerson?existingPerson.id:uid('p'), name:fd.get('name'), title:fd.get('title'), email:fd.get('email'), phone:fd.get('phone')};
    if(existingPerson){
      const idx = company.people.findIndex(p=>p.id===existingPerson.id);
      company.people[idx] = obj;
    } else {
      company.people.push(obj);
    }
    closeModal(); persist(); showToast('담당자 정보가 저장되었습니다.');
  });
}

function bindModalCommon(){
  const closeBtn = document.getElementById('closeModal');
  if(closeBtn) closeBtn.addEventListener('click', closeModal);
}

function bindVendorFormSubmit(existingVendor){
  document.getElementById('vendorForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const obj = {
      id: existingVendor ? existingVendor.id : uid('v'),
      name: fd.get('name'), priority: fd.get('priority'), status: existingVendor?existingVendor.status:'전송',
      contact:{name:fd.get('contactName'), title:fd.get('contactTitle'), email:fd.get('contactEmail'), phone:fd.get('contactPhone')},
      notes:{discount:fd.get('discount'), payment:fd.get('payment'), moq:fd.get('moq'), creditLimit:fd.get('creditLimit')}
    };
    if(existingVendor){
      const idx = state.data.vendors.findIndex(v=>v.id===existingVendor.id);
      state.data.vendors[idx] = obj;
    } else {
      state.data.vendors.push(obj);
    }
    closeModal(); persist(); showToast('벤더 정보가 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteVendorBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 벤더를 삭제하시겠습니까? 관련 로그도 함께 삭제됩니다.')){
      state.data.vendors = state.data.vendors.filter(v=>v.id!==existingVendor.id);
      state.data.vendorLogs = state.data.vendorLogs.filter(l=>l.vendorId!==existingVendor.id);
      state.selectedVendorId = null;
      closeModal(); persist(); showToast('벤더가 삭제되었습니다.');
    }
  });
}

function bindProjectFormSubmit(existingProject){
  document.getElementById('projectForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    let category = fd.get('category');
    if(category==='__new__'){
      const nc = (fd.get('newCategory')||'').trim();
      if(nc){
        category = nc;
        if(!state.data.categories.includes(nc)) state.data.categories.push(nc);
      } else {
        category = '기타';
      }
    }
    const obj = {
      id: existingProject ? existingProject.id : uid('p'),
      title: fd.get('title'), category, owner: fd.get('owner')||'Sena Cheon',
      deadline: fd.get('deadline')||'', vendorId: fd.get('vendorId')||'',
      checklist: existingProject ? existingProject.checklist : [],
      meetingNotes: existingProject ? existingProject.meetingNotes : [],
      logs: existingProject ? (existingProject.logs||[]) : []
    };
    if(existingProject){
      const idx = state.data.projects.findIndex(p=>p.id===existingProject.id);
      state.data.projects[idx] = obj;
    } else {
      state.data.projects.push(obj);
    }
    closeModal(); persist(); showToast('프로젝트가 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteProjectBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 프로젝트를 삭제하시겠습니까?')){
      state.data.projects = state.data.projects.filter(p=>p.id!==existingProject.id);
      state.selectedProjectId = null;
      closeModal(); persist(); showToast('프로젝트가 삭제되었습니다.');
    }
  });
}

function bindEventFormSubmit(){
  document.getElementById('eventForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.calendar.push({
      id: uid('ev'), date: fd.get('date'), type: fd.get('type'), title: fd.get('title'),
      time: fd.get('time')||'', vendorId: fd.get('vendorId')||''
    });
    closeModal(); persist(); showToast('일정이 등록되었습니다.');
  });
}

function bindDayDetailEvents(dateStr){
  document.querySelectorAll('.day-event-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(el.dataset.projectid){
        state.selectedProjectId = el.dataset.projectid;
        state.view = 'projects';
        closeModal(); render();
      }
    });
  });
  const addBtn = document.getElementById('addEventFromDayBtn');
  if(addBtn) addBtn.addEventListener('click', ()=>{
    closeModal();
    openModal(modalEventForm(dateStr));
    bindModalCommon();
    bindEventFormSubmit();
  });
}

function renderMeetingResult(result, originalText){
  const resultDiv = document.getElementById('mnResult');
  resultDiv.innerHTML = `
    <div style="border-top:0.5px solid var(--border); padding-top:14px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <i class="ti ti-sparkles" style="font-size:16px; color:var(--text-accent);"></i>
        <h3 style="margin:0;">AI 요약</h3>
      </div>
      <p style="font-size:13px; color:var(--text-secondary); line-height:1.6; margin:0 0 16px;">${result.summary}</p>
      <p style="font-size:13px; font-weight:500; margin:0 0 10px;">추출된 액션 아이템 · 체크한 항목만 체크리스트에 추가됩니다</p>
      <div id="actionItemsList" style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">
        ${result.items.map((item,i)=>`
          <label style="display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--surface-1); border-radius:var(--radius); cursor:pointer;">
            <input type="checkbox" class="action-item-check" data-idx="${i}" checked style="width:14px; height:14px; margin-top:2px;"/>
            <span style="font-size:13px; flex:1;">${item.text}</span>
          </label>
        `).join('')}
      </div>
      <div style="display:flex; gap:8px;">
        <button type="button" id="cancelMeetingNote" style="flex:1;">취소</button>
        <button type="button" id="confirmAddItems" class="primary" style="flex:1;">체크리스트에 추가</button>
      </div>
    </div>
  `;
  document.getElementById('cancelMeetingNote').addEventListener('click', closeModal);
  document.getElementById('confirmAddItems').addEventListener('click', ()=>{
    const projectId = document.getElementById('mnProject').value;
    const date = document.getElementById('mnDate').value;
    const p = state.data.projects.find(x=>x.id===projectId);
    if(!p){ showToast('프로젝트를 찾을 수 없습니다.'); return; }

    const checks = document.querySelectorAll('.action-item-check');
    let addedCount = 0;
    checks.forEach(c=>{
      if(c.checked){
        const idx = parseInt(c.dataset.idx);
        p.checklist.push({id:uid('c'), text:result.items[idx].text, done:false});
        addedCount++;
      }
    });
    if(!p.meetingNotes) p.meetingNotes = [];
    p.meetingNotes.push({id:uid('mn'), date, text:originalText, summary:result.summary});

    closeModal();
    persist();
    showToast(`회의록이 저장되고 체크리스트에 ${addedCount}건 추가되었습니다.`);
  });
}

/* ---------- 앱 초기화 ---------- */
async function initApp(){
  const app = document.getElementById('app');
  app.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; min-height:100vh; width:100%; color:var(--text-muted); font-size:13px;">불러오는 중...</div>`;
  try{
    state.data = await loadStoreRemote();
    render();
  }catch(e){
    console.error(e);
    app.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; width:100%; gap:10px; padding:2rem; text-align:center;">
      <p style="font-size:14px; color:var(--text-danger);">데이터를 불러오지 못했습니다.</p>
      <p style="font-size:12px; color:var(--text-muted);">${e.message}</p>
      <button id="retryBtn">다시 시도</button>
    </div>`;
    document.getElementById('retryBtn').addEventListener('click', initApp);
  }
}
initApp();
</script>
</body>
</html>
