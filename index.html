<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 대시보드</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<style>
:root{
  --bg:#F5F4F0;
  --surface:#FFFFFF;
  --border:#E8E6E0;
  --border-strong:#D4D1C8;
  --text-primary:#1A1916;
  --text-secondary:#6B6860;
  --text-muted:#9B9890;
  --accent:#2554C7;
  --accent-bg:#EBF0FB;
  --accent-text:#1A3A9E;
  --danger:#D93B3B;
  --danger-bg:#FDEAEA;
  --success:#2E7D32;
  --success-bg:#E8F5E9;
  --warning:#B45309;
  --warning-bg:#FEF3C7;
  --header-h:52px;
  --sidebar-w:220px;
  --radius:8px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:13px;line-height:1.5;}
h1{font-size:20px;font-weight:600;}
h2{font-size:16px;font-weight:600;}
h3{font-size:14px;font-weight:600;}

/* ── 헤더 ── */
.header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;z-index:50;
}
.header-logo{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--text-primary);
  border-right:1px solid var(--border);padding-right:16px;
}
.logo-badge{
  width:28px;height:28px;border-radius:6px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
}
.header-nav{display:flex;align-items:center;gap:2px;flex:1;}
.header-tab{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:6px;
  font-size:13px;color:var(--text-muted);
  cursor:pointer;border:none;background:none;
  white-space:nowrap;font-family:var(--font);
  transition:background .1s,color .1s;
}
.header-tab:hover{background:var(--bg);color:var(--text-primary);}
.header-tab.active{
  color:var(--accent);font-weight:600;
  position:relative;
}
.header-tab.active::after{
  content:'';position:absolute;bottom:-14px;left:0;right:0;
  height:2px;background:var(--accent);border-radius:2px 2px 0 0;
}
.header-tab i{font-size:14px;}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.dday-badge{
  font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;
  background:var(--danger-bg);color:var(--danger);
}
.avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
}

/* ── 메인 콘텐츠 ── */
.main{
  margin-top:var(--header-h);
  padding:24px 28px;
  max-width:1280px;
  min-height:calc(100vh - var(--header-h));
}

/* ── 지표 카드 ── */
.metrics-row{
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
  margin-bottom:20px;
}
.metric-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;text-align:center;
}
.metric-card .val{
  font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;
  color:var(--text-primary);
}
.metric-card .val.danger{color:var(--danger);}
.metric-card .val.accent{color:var(--accent);}
.metric-card .lbl{font-size:11px;color:var(--text-muted);}

/* ── 카드 ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.card-header-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;}
.card-body{padding:16px;}

/* ── 2컬럼 레이아웃 ── */
.two-col{display:grid;grid-template-columns:1fr 380px;gap:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* ── 활동 피드 ── */
.feed-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
}
.feed-item:last-child{border-bottom:none;}
.feed-content{flex:1;min-width:0;}
.feed-content .title{font-size:13px;color:var(--text-primary);line-height:1.4;}
.feed-content .title strong{font-weight:600;}
.feed-content .time{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* ── 진행률 바 ── */
.progress-row{
  display:flex;align-items:center;gap:10px;padding:8px 16px;
  border-bottom:1px solid var(--border);
}
.progress-row:last-child{border-bottom:none;}
.progress-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.progress-label{font-size:12px;color:var(--text-primary);width:90px;flex-shrink:0;}
.progress-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:3px;}
.progress-pct{font-size:11px;color:var(--text-muted);width:36px;text-align:right;}

/* ── 테이블 ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{
  padding:9px 14px;text-align:left;font-size:11px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;
  background:var(--bg);border-bottom:1px solid var(--border);
}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.clickable{cursor:pointer;}
.tbl tr.clickable:hover td{background:#FAFAF8;}

/* ── 배지 ── */
.badge{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;
}
.badge-danger{background:var(--danger-bg);color:var(--danger);}
.badge-success{background:var(--success-bg);color:var(--success);}
.badge-warning{background:var(--warning-bg);color:var(--warning);}
.badge-accent{background:var(--accent-bg);color:var(--accent-text);}
.badge-neutral{background:var(--bg);color:var(--text-muted);border:1px solid var(--border);}

/* ── 태그 필터 ── */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-muted);cursor:pointer;white-space:nowrap;
  transition:all .1s;
}
.tag.active,.tag:hover{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent);}

/* ── 버튼 ── */
button{font-family:var(--font);cursor:pointer;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;padding:7px 14px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-primary);cursor:pointer;white-space:nowrap;
  transition:background .1s;
}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1a44b0;}
.btn-danger{color:var(--danger);border-color:var(--danger-bg);}
.btn i{font-size:14px;}

/* ── 인풋 ── */
input,select,textarea{
  font-family:var(--font);font-size:13px;
  padding:8px 10px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text-primary);width:100%;outline:none;
  transition:border-color .1s,box-shadow .1s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);
}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}

/* ── 프로젝트 카드 ── */
.proj-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;cursor:pointer;
  transition:border-color .1s,box-shadow .1s;
}
.proj-card:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(37,84,199,.08);}

/* ── 체크리스트 카드 ── */
.cl-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.cl-item:last-child{border-bottom:none;}
.cl-item:hover{background:#FAFAF8;margin:0 -16px;padding:10px 16px;}

/* ── 진행률 바 (프로젝트 내) ── */
.pbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:10px;}
.pbar-fill{height:100%;background:var(--accent);border-radius:2px;}

/* ── 캘린더 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cal-head{background:var(--bg);padding:8px;text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.cal-cell{min-height:80px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface);}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell:hover{background:#FAFAF8;}
.cal-daynum{font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:2px;}
.cal-daynum.today{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#fff;font-weight:700;
}
.cal-event{font-size:10px;padding:1px 5px;border-radius:3px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── 모달 ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;
}
.modal{
  background:var(--surface);border-radius:12px;
  border:1px solid var(--border);padding:20px;
  width:440px;max-width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.modal-wide{width:580px;}
.modal-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title h3{font-size:15px;font-weight:600;}
.close-x{cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;}

/* ── 기타 ── */
.back-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:var(--text-muted);cursor:pointer;
  margin-bottom:16px;
}
.back-link:hover{color:var(--text-primary);}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted);}
.search-wrap{position:relative;}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;}
.search-wrap input{padding-left:32px;}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.contact-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border);}
.contact-row:last-child{border-bottom:none;}
.activity-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-row:last-child{border-bottom:none;}

.toast{
  position:fixed;bottom:24px;right:24px;
  background:#1A1916;color:#fff;
  padding:10px 18px;border-radius:var(--radius);
  font-size:13px;z-index:200;
  opacity:0;transform:translateY(8px);
  transition:opacity .2s,transform .2s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#2E7D32;display:inline-block;margin-right:4px;}

@media(max-width:900px){
  .metrics-row{grid-template-columns:repeat(3,1fr);}
  .two-col{grid-template-columns:1fr;}
  .header-tab span{display:none;}
}
</style>

</head>

<script>
/* ============================================================
   경량 날짜 유틸 (dayjs 대체 - 외부 CDN 의존 제거)
   ============================================================ */
function dayjs(input){
  let d;
  if(input===undefined) d = new Date();
  else if(input instanceof Date) d = new Date(input);
  else if(typeof input === 'string'){
    d = new Date(input.length<=10 ? input+'T00:00:00' : input);
  } else d = new Date(input);

  const obj = {
    _d: d,
    format(fmt){
      const Y = d.getFullYear(), M = d.getMonth()+1, D = d.getDate();
      const dowNames = ['일','월','화','수','목','금','토'];
      const dow = dowNames[d.getDay()];
      const h = d.getHours(), m = d.getMinutes();
      const pad = n => String(n).padStart(2,'0');
      return fmt
        .replace(/YYYY/g, Y)
        .replace(/MM/g, pad(M))
        .replace(/M/g, M)
        .replace(/DD/g, pad(D))
        .replace(/D/g, D)
        .replace(/ddd/g, dow)
        .replace(/HH/g, pad(h))
        .replace(/mm/g, pad(m));
    },
    add(n, unit){
      const nd = new Date(d);
      if(unit==='day') nd.setDate(nd.getDate()+n);
      else if(unit==='month') nd.setMonth(nd.getMonth()+n);
      else if(unit==='year') nd.setFullYear(nd.getFullYear()+n);
      return dayjs(nd);
    },
    subtract(n, unit){ return obj.add(-n, unit); },
    diff(other, unit){
      const od = other._d ? other._d : new Date(other);
      const ms = d.getTime() - od.getTime();
      if(unit==='day') return Math.round(ms/86400000);
      if(unit==='month') return (d.getFullYear()-od.getFullYear())*12 + (d.getMonth()-od.getMonth());
      return ms;
    },
    date(n){
      if(n===undefined) return d.getDate();
      const nd = new Date(d); nd.setDate(n); return dayjs(nd);
    },
    day(){ return d.getDay(); },
    startOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setDate(1); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    endOf(unit){
      const nd = new Date(d);
      if(unit==='month'){ nd.setMonth(nd.getMonth()+1); nd.setDate(0); nd.setHours(0,0,0,0); }
      return dayjs(nd);
    },
    isValid(){ return !isNaN(d.getTime()); }
  };
  return obj;
}

/* ============================================================
   업무 대시보드 - 단일 파일 앱
   데이터 저장: Supabase (app_data 테이블, id='main' 단일 행에 JSON 저장)
   ============================================================ */

/* ---------- Supabase 설정 ---------- */
const SUPABASE_URL = 'https://afdospdphlkcjyvdlukg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmZG9zcGRwaGxrY2p5dmRsdWtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MDAyNTEsImV4cCI6MjA5ODM3NjI1MX0.o9IRhp5dsUark4xD3QnOieLdjA52JAcZMPXx-VmZNfU';
const SUPABASE_TABLE = 'app_data';
const SUPABASE_ROW_ID = 'main';

async function supabaseFetch(path, options={}){
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const {prefer, body, method, ...rest} = options;
  const res = await fetch(url, {
    method: method || 'GET',
    mode: 'cors',
    credentials: 'omit',
    body: body || undefined,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': prefer || 'return=representation',
    }
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text}`);
  }
  const text = await res.text();
  if(!text) return null;
  try{ return JSON.parse(text); }catch(e){ return null; }
}

async function loadStoreRemote(){
  const rows = await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}&select=data`);
  if(rows && rows.length>0 && rows[0].data && Object.keys(rows[0].data).length>0){
    return rows[0].data;
  }
  // 행이 비어있으면 시드 데이터로 초기 저장
  const seed = seedData();
  await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ data: seed })
  });
  return seed;
}

let saveTimer = null;
let saveInFlight = false;
let savePending = false;

function saveStore(){
  // 디바운스: 짧은 시간 내 연속 저장 요청을 묶어서 한 번만 전송
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSaveStore, 400);
}

async function doSaveStore(){
  if(saveInFlight){ savePending = true; return; }
  saveInFlight = true;
  try{
    await supabaseFetch(`${SUPABASE_TABLE}?id=eq.${SUPABASE_ROW_ID}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ data: state.data, updated_at: new Date().toISOString() })
    });
    setSyncStatus('synced');
  }catch(e){
    console.error('저장 실패:', e);
    setSyncStatus('error');
  }finally{
    saveInFlight = false;
    if(savePending){ savePending = false; doSaveStore(); }
  }
}

function setSyncStatus(status){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(status==='saving'){ el.textContent = '저장 중...'; el.style.color = 'var(--text-muted)'; }
  else if(status==='synced'){ el.textContent = '저장됨'; el.style.color = 'var(--success)'; }
  else if(status==='error'){ el.textContent = '저장 실패 (연결 확인)'; el.style.color = 'var(--danger)'; }
}

function showToast(msg){

}

/* ---------- 유틸 ---------- */
function daysAgo(dateStr){
  if(!dateStr) return null;
  return dayjs().diff(dayjs(dateStr), 'day');
}
function fmtDate(d){ return dayjs(d).format('M월 D일'); }
function fmtDateDow(d){ return dayjs(d).format('M월 D일 (ddd)'); }

function latestLogForVendor(vendorId){
  const logs = state.data.vendorLogs.filter(l=>l.vendorId===vendorId);
  if(logs.length===0) return null;
  return logs.slice().sort((a,b)=> dayjs(b.date).diff(dayjs(a.date)))[0];
}
function logsForVendor(vendorId){
  return state.data.vendorLogs.filter(l=>l.vendorId===vendorId).slice().sort((a,b)=> dayjs(b.date).diff(dayjs(a.date)));
}
function projectsForVendor(vendorId){
  return state.data.projects.filter(p=>p.vendorId===vendorId);
}
function progressOf(project){
  if(!project.checklist.length) return 0;
  const done = project.checklist.filter(c=>c.done).length;
  return Math.round(done/project.checklist.length*100);
}
function priorityColor(p){
  if(p==='높음') return {bg:'var(--danger-bg)', text:'var(--danger)'};
  if(p==='보통') return {bg:'var(--warning-bg)', text:'var(--warning)'};
  if(p==='완료') return {bg:'var(--surface)', text:'var(--text-muted)'};
  return {bg:'var(--success-bg)', text:'var(--success)'};
}
function eventColor(type){
  if(type==='미팅') return {bg:'var(--accent-bg)', text:'var(--accent-text)', dot:'#2554C7'};
  if(type==='외근') return {bg:'var(--bg-coral)', text:'var(--text-coral)', dot:'#D85A30'};
  if(type==='마감') return {bg:'var(--bg-pro)', text:'var(--text-pro)', dot:'#7F77DD'};
  if(type==='연차') return {bg:'var(--success-bg)', text:'var(--success)', dot:'#1D9E75'};
  return {bg:'var(--surface)', text:'var(--text-muted)', dot:'#888780'};
}
function allCalendarEvents(){
  const evs = state.data.calendar.map(e=>({...e}));
  state.data.projects.forEach(p=>{
    if(p.deadline){
      evs.push({id:'deadline_'+p.id, date:p.deadline, type:'마감', title:p.title+' 마감', time:'', projectId:p.id});
    }
  });
  return evs;
}
function eventsOnDate(dateStr){
  return allCalendarEvents().filter(e=>e.date===dateStr);
}

/* ---------- 렌더 루트 ---------- */
function avatarColor(name){
  const colors = ['#2554C7','#7C3AED','#DB2777','#D97706','#059669','#DC2626','#0891B2','#65A30D'];
  let h = 0; for(let c of (name||'?')) h = (h*31 + c.charCodeAt(0)) & 0xFFFFFF;
  return colors[Math.abs(h) % colors.length];
}
function avatarEl(name, size=28){
  const initials = (name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const bg = avatarColor(name);
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};font-size:${size<=24?10:11}px;">${initials}</div>`;
}

    vendors = vendors.filter(v=> v.name.toLowerCase().includes(q) || (v.contact.name||'').toLowerCase().includes(q));
  }
  vendors.sort((a,b)=>{
    const da = a.latest ? daysAgo(a.latest.date) : -1;
    const db = b.latest ? daysAgo(b.latest.date) : -1;
    return db - da;
  });

  const highCount = state.data.vendors.filter(v=>v.priority==='높음').length;
  const waitingCount = state.data.vendors.filter(v=>{const l=latestLogForVendor(v.id); return l && (l.status==='전송'||l.status==='수신');}).length;
  const staleCount = vendors.filter(v=>v.latest && daysAgo(v.latest.date)>=90).length;

  return `

function checklistAssigneeName(c){
  if(!c.assigneeId) return '';
  if(c.assigneeType==='internal') return c.assigneeId;
  const people = allPeopleFlat();
  const person = people.find(p=>p.id===c.assigneeId);
  return person ? `${person.companyName} · ${person.name}` : '';
}
function checklistStatusColor(status){
  if(status==='완료') return {bg:'var(--success-bg)', text:'var(--success)'};
  if(status==='진행중') return {bg:'var(--accent-bg)', text:'var(--accent-text)'};
  if(status==='보류') return {bg:'var(--warning-bg)', text:'var(--warning)'};
  return {bg:'var(--surface)', text:'var(--text-muted)'};
}


/* ---------- 캘린더 ---------- */
function viewCalendar(){
  const month = dayjs(state.calMonth+'-01');
  const startOfMonth = month.startOf('month');
  const endOfMonth = month.endOf('month');
  const startDay = startOfMonth.day();
  const daysInMonth = endOfMonth.date();
  const todayStr = dayjs().format('YYYY-MM-DD');

  let cells = [];
  for(let i=0;i<startDay;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const dowNames = ['일','월','화','수','목','금','토'];

  return `
    <div class="row">
      <div style="display:flex; align-items:center; gap:12px;">
        <i class="ti ti-chevron-left" id="prevMonth" style="font-size:18px; cursor:pointer;"></i>
        <h2 style="margin:0">${month.format('YYYY년 M월')}</h2>
        <i class="ti ti-chevron-right" id="nextMonth" style="font-size:18px; cursor:pointer;"></i>
      </div>
      ${!isReadOnly() ? `<button class="primary" id="addEventBtnTop"><i class="ti ti-plus"></i> 일정 등록</button>` : ''}
    </div>

    <div class="legend">
      <span><span class="dot" style="background:#2554C7"></span>미팅</span>
      <span><span class="dot" style="background:#D85A30"></span>외근</span>
      <span><span class="dot" style="background:#7F77DD"></span>프로젝트 마감</span>
      <span><span class="dot" style="background:#1D9E75"></span>연차/반차</span>
    </div>

    <div class="cal-grid">
      ${dowNames.map(d=>`<div class="cal-head">${d}</div>`).join('')}
      ${cells.map(d=>{
        if(d===null) return `<div class="cal-cell" style="cursor:default;"></div>`;
        const dateStr = month.date(d).format('YYYY-MM-DD');
        const evs = eventsOnDate(dateStr);
        const isToday = dateStr===todayStr;
        return `<div class="cal-cell" data-date="${dateStr}">
          <span class="daynum ${isToday?'today':''}">${d}</span>
          ${evs.slice(0,3).map(e=>{
            const c = eventColor(e.type);
            return `<div class="cal-event" style="background:${c.bg}; color:${c.text};">${e.title}</div>`;
          }).join('')}
          ${evs.length>3?`<div style="font-size:10px; color:var(--text-muted); margin-top:2px;">+${evs.length-3}건</div>`:''}
        </div>`;
      }).join('')}
    </div>
  `;
}

function openModal(html){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modalOverlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal(){
  const m = document.getElementById('modalOverlay');
  if(m) m.remove();
}

/* 간단한 규칙 기반 요약/액션아이템 추출 (Claude API 연동 시 이 함수를 교체) */
function generateMeetingSummary(text){
  const sentences = text.split(/[.。\n]/).map(s=>s.trim()).filter(Boolean);
  const summary = sentences.slice(0,2).join('. ') + (sentences.length>0?'.':'');
  const actionKeywords = ['필요','예정','하기로','전달','검토','보고','확인','요청','작성'];
  const candidates = sentences.filter(s=> actionKeywords.some(k=>s.includes(k)));
  const items = candidates.slice(0,5).map(s=>({text:s.replace(/^(그리고|또한|그래서)\s*/,''), deadline:''}));
  if(items.length===0 && sentences.length>0){
    items.push({text:sentences[0], deadline:''});
  }
  return {summary: summary || '요약할 내용이 없습니다.', items};
}

/* 로그 원본 -> 한 줄 요약 (간단 규칙 기반, Claude API 연동 시 교체) */
function generateOneLineSummary(text){
  const sentences = text.split(/[.。\n]/).map(s=>s.trim()).filter(Boolean);
  if(sentences.length===0) return '';
  let first = sentences[0];
  if(first.length>60) first = first.slice(0,57)+'...';
  return first;
}

function bindChecklistDetailForm(item){
  const typeSel = document.getElementById('assigneeTypeSelect');
  typeSel.addEventListener('change', ()=>{
    document.getElementById('assigneeInternalField').style.display = typeSel.value==='internal' ? 'block' : 'none';
    document.getElementById('assigneeExternalField').style.display = typeSel.value==='external' ? 'block' : 'none';
  });

  let attachments = (item.attachments||[]).slice();
  document.getElementById('addAttachmentBtn').addEventListener('click', ()=>{
    const list = document.getElementById('attachmentList');
    const idx = list.children.length;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; gap:6px; align-items:center;';
    row.innerHTML = `<input type="text" class="attachment-input" placeholder="https://..." style="flex:1;"/><i class="ti ti-x remove-attachment" style="cursor:pointer; color:var(--text-muted);"></i>`;
    list.appendChild(row);
    row.querySelector('.remove-attachment').addEventListener('click', ()=> row.remove());
  });
  document.querySelectorAll('.remove-attachment').forEach(el=>{
    el.addEventListener('click', ()=> el.closest('div').remove());
  });

  document.getElementById('checklistDetailForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
    const target = p.checklist.find(c=>c.id===item.id);
    target.text = fd.get('text');
    target.status = fd.get('status');
    target.priority = fd.get('priority');
    target.startDate = fd.get('startDate')||'';
    target.dueDate = fd.get('dueDate')||'';
    target.requester = fd.get('requester')||'';
    target.done = fd.get('status')==='완료';
    const aType = fd.get('assigneeType');
    target.assigneeType = aType;
    if(aType==='internal') target.assigneeId = fd.get('assigneeInternal')||'';
    else if(aType==='external') target.assigneeId = fd.get('assigneeExternal')||'';
    else target.assigneeId = '';
    target.attachments = Array.from(document.querySelectorAll('.attachment-input')).map(i=>i.value.trim()).filter(Boolean);
    closeModal(); persist(); showToast('체크리스트 항목이 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteChecklistBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 항목을 삭제하시겠습니까?')){
      const p = state.data.projects.find(x=>x.id===state.selectedProjectId);
      p.checklist = p.checklist.filter(c=>c.id!==item.id);
      closeModal(); persist(); showToast('항목이 삭제되었습니다.');
    }
  });
}

function bindPersonFormSubmit(existingPerson){
  document.getElementById('personForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const company = state.data.companies.find(c=>c.id===fd.get('companyId'));
    const obj = {id: existingPerson?existingPerson.id:uid('p'), name:fd.get('name'), title:fd.get('title'), email:fd.get('email'), phone:fd.get('phone')};
    if(existingPerson){
      const idx = company.people.findIndex(p=>p.id===existingPerson.id);

    } else {
      company.people.push(obj);
    }
    closeModal(); persist(); showToast('담당자 정보가 저장되었습니다.');
  });
}

function bindProjectFormSubmit(existingProject){
  document.getElementById('projectForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    let category = fd.get('category');
    if(category==='__new__'){
      const nc = (fd.get('newCategory')||'').trim();
      if(nc){
        category = nc;
        if(!state.data.categories.includes(nc)) state.data.categories.push(nc);
      } else {
        category = '기타';
      }
    }
    const obj = {
      id: existingProject ? existingProject.id : uid('p'),
      title: fd.get('title'), category, owner: fd.get('owner')||'Sena Cheon',
      deadline: fd.get('deadline')||'', vendorId: fd.get('vendorId')||'',
      checklist: existingProject ? existingProject.checklist : [],
      meetingNotes: existingProject ? existingProject.meetingNotes : [],
      logs: existingProject ? (existingProject.logs||[]) : []
    };
    if(existingProject){
      const idx = state.data.projects.findIndex(p=>p.id===existingProject.id);
      state.data.projects[idx] = obj;
    } else {
      state.data.projects.push(obj);
    }
    closeModal(); persist(); showToast('프로젝트가 저장되었습니다.');
  });
  const deleteBtn = document.getElementById('deleteProjectBtn');
  if(deleteBtn) deleteBtn.addEventListener('click', ()=>{
    if(confirm('이 프로젝트를 삭제하시겠습니까?')){
      state.data.projects = state.data.projects.filter(p=>p.id!==existingProject.id);
      state.selectedProjectId = null;
      closeModal(); persist(); showToast('프로젝트가 삭제되었습니다.');
    }
  });
}

function bindEventFormSubmit(){
  document.getElementById('eventForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    state.data.calendar.push({
      id: uid('ev'), date: fd.get('date'), type: fd.get('type'), title: fd.get('title'),
      time: fd.get('time')||'', vendorId: fd.get('vendorId')||''
    });
    closeModal(); persist(); showToast('일정이 등록되었습니다.');
  });
}

function bindDayDetailEvents(dateStr){
  document.querySelectorAll('.day-event-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      if(el.dataset.projectid){
        state.selectedProjectId = el.dataset.projectid;
        state.view = 'projects';
        closeModal(); render();
      }
    });
  });
  const addBtn = document.getElementById('addEventFromDayBtn');
  if(addBtn) addBtn.addEventListener('click', ()=>{
    closeModal();
    openModal(modalEventForm(dateStr));
    bindModalCommon();
    bindEventFormSubmit();
  });
}

function renderMeetingResult(result, originalText){
  const resultDiv = document.getElementById('mnResult');
  resultDiv.innerHTML = `
    <div style="border-top:0.5px solid var(--border); padding-top:14px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <i class="ti ti-sparkles" style="font-size:16px; color:var(--accent-text);"></i>
        <h3 style="margin:0;">AI 요약</h3>
      </div>
      <p style="font-size:13px; color:var(--text-muted); line-height:1.6; margin:0 0 16px;">${result.summary}</p>
      <p style="font-size:13px; font-weight:500; margin:0 0 10px;">추출된 액션 아이템 · 체크한 항목만 체크리스트에 추가됩니다</p>
      <div id="actionItemsList" style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">
        ${result.items.map((item,i)=>`
          <label style="display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:var(--surface); border-radius:var(--radius); cursor:pointer;">
            <input type="checkbox" class="action-item-check" data-idx="${i}" checked style="width:14px; height:14px; margin-top:2px;"/>
            <span style="font-size:13px; flex:1;">${item.text}</span>
          </label>
        `).join('')}
      </div>
      <div style="display:flex; gap:8px;">
        <button type="button" id="cancelMeetingNote" style="flex:1;">취소</button>
        <button type="button" id="confirmAddItems" class="primary" style="flex:1;">체크리스트에 추가</button>
      </div>
    </div>
  `;
  document.getElementById('cancelMeetingNote').addEventListener('click', closeModal);
  document.getElementById('confirmAddItems').addEventListener('click', ()=>{
    const projectId = document.getElementById('mnProject').value;
    const date = document.getElementById('mnDate').value;
    const p = state.data.projects.find(x=>x.id===projectId);
    if(!p){ showToast('프로젝트를 찾을 수 없습니다.'); return; }

    const checks = document.querySelectorAll('.action-item-check');
    let addedCount = 0;
    checks.forEach(c=>{
      if(c.checked){
        const idx = parseInt(c.dataset.idx);
        p.checklist.push({id:uid('c'), text:result.items[idx].text, done:false});
        addedCount++;
      }
    });
    if(!p.meetingNotes) p.meetingNotes = [];
    p.meetingNotes.push({id:uid('mn'), date, text:originalText, summary:result.summary});

    closeModal();
    persist();
    showToast(`회의록이 저장되고 체크리스트에 ${addedCount}건 추가되었습니다.`);
  });
}

/* ---------- 앱 초기화 ---------- */
async function initApp(){
  const app = document.getElementById('app');
  app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text-muted);font-size:13px;">불러오는 중...</div>`;
  try{
    state.data = await loadStoreRemote();
    render();
  }catch(e){
    console.error('Dashboard error:', e);
    const isNetworkError = e.message.includes('fetch') || e.message.includes('network') || e.message.includes('CORS');
    app.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:2rem;text-align:center;">
      <div style="font-size:32px;">⚠️</div>
      <p style="font-size:15px;font-weight:600;color:var(--danger);">데이터를 불러오지 못했습니다</p>
      <p style="font-size:12px;color:var(--text-muted);max-width:400px;">${e.message}</p>
      ${isNetworkError ? `<p style="font-size:12px;color:var(--text-muted);background:var(--bg);padding:10px 16px;border-radius:8px;max-width:400px;">
        Supabase 대시보드 → Project Settings → API → <strong>Allowed origins</strong>에<br>
        <code style="background:#eee;padding:2px 6px;border-radius:4px;">https://senantwglobal.github.io</code><br>
        를 추가했는지 확인해주세요.
      </p>` : ''}
      <button id="retryBtn" class="btn btn-primary">다시 시도</button>
    </div>`;
    document.getElementById('retryBtn').addEventListener('click', initApp);
  }
}
initApp();
</script>
</body>
</html>
